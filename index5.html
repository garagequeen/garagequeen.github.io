<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Garage Log</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;-webkit-user-select:none;user-select:none;}
body{height:100vh;background:#111;color:white;overflow:hidden;}
#bg{position:fixed;inset:0;object-fit:cover;z-index:-2;}
#overlay{position:fixed;inset:0;background:rgba(0,0,0,0.6);backdrop-filter:blur(8px);z-index:-1;}
#loading{position:fixed;inset:0;background:#111;display:flex;align-items:center;justify-content:center;flex-direction:column;z-index:100;}
#loading h1{font-size:26px;margin-bottom:10px;}
#login{position:fixed;inset:0;background:#111;display:none;flex-direction:column;align-items:center;justify-content:center;z-index:90;}
#login button{padding:14px 20px;font-size:16px;border:none;border-radius:10px;background:#3fb950;color:white;cursor:pointer;}
#app{display:none;height:100vh;}
.container{display:flex;flex-direction:column;height:calc(100vh - 70px);}
.top-area{flex:0.3;display:flex;align-items:center;justify-content:center;}
.middle-area{flex:0.3;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:10px;padding:10px 20px;overflow:auto;}
.bottom-area{flex:0.4;padding:10px 20px 20px;overflow:auto;}
.card{background:rgba(20,20,20,0.7);backdrop-filter:blur(20px);border-radius:18px;padding:20px;width:90%;max-width:420px;box-shadow:0 8px 30px rgba(0,0,0,0.5);}
.card h2{font-size:22px;margin-bottom:8px;}
.card p{opacity:0.8;margin-bottom:6px;}
.tag{display:inline-block;padding:4px 8px;background:#444;border-radius:6px;font-size:12px;margin-right:5px;margin-bottom:4px;}
.progress-container{margin-top:12px;background:rgba(255,255,255,0.12);border-radius:6px;height:8px;overflow:hidden;}
.progress-bar{height:100%;background:#3fb950;transition:width .4s;}
.bottom{position:fixed;bottom:0;left:0;width:100%;height:70px;background:rgba(0,0,0,0.6);backdrop-filter:blur(10px);display:flex;justify-content:space-around;align-items:center;}
.bottom button{background:none;border:none;color:white;font-size:14px;opacity:0.7;cursor:pointer;}
.bottom button.active{opacity:1;font-weight:bold;}
.hidden{display:none;}
.act-btn{flex:1;padding:10px;border:none;border-radius:8px;font-size:14px;cursor:pointer;}
</style>
</head>
<body>

<img id="bg">
<div id="overlay"></div>

<div id="loading"><h1>Garage Log</h1><p>loading...</p></div>

<div id="login">
  <h2>Sign in</h2>
  <p style="opacity:0.6;margin:10px 0 20px">Google account required</p>
  <button onclick="googleLogin()">Sign in with Google</button>
</div>

<div id="app">
  <div class="container">

    <!-- TASKS -->
    <div id="tasks" class="top-area">
      <div class="card">
        <p id="taskMeta" style="opacity:0.4;font-size:12px;margin-bottom:6px"></p>
        <h2 id="taskTitle"></h2>
        <p id="taskObj" style="opacity:0.5;font-size:13px"></p>
        <div id="taskTags" style="margin-top:8px"></div>
        <p id="taskNote" style="margin-top:8px;font-size:13px;opacity:0.6"></p>
        <div class="progress-container"><div class="progress-bar" id="progress" style="width:0%"></div></div>
        <div style="margin-top:14px;display:flex;gap:10px">
          <button class="act-btn" onclick="doneTask()" style="background:#3fb950;color:#fff">✓ Done</button>
          <button class="act-btn" onclick="skipTask()" style="background:rgba(255,255,255,0.1);color:#fff">Skip →</button>
        </div>
      </div>
    </div>

    <!-- PROJECTS -->
    <div id="projects" class="middle-area hidden" id="projectsList"></div>

    <!-- BUDGET -->
    <div id="budget" class="middle-area hidden">
      <div class="card" style="width:90%">
        <h2>Buy list</h2>
        <div id="buyList"></div>
      </div>
    </div>

    <!-- TOOLS -->
    <div id="tools" class="middle-area hidden">
      <div class="card" style="width:90%">
        <h2>All tasks</h2>
        <div id="allTasks" style="max-height:50vh;overflow:auto"></div>
      </div>
    </div>

    <!-- SETTINGS -->
    <div id="settings" class="bottom-area hidden">
      <div class="card">
        <h2>Background</h2>
        <input type="file" id="bgUpload" accept="image/*" style="margin-top:8px">
      </div>
      <div class="card" style="margin-top:10px">
        <p id="userInfo" style="opacity:0.5;font-size:13px"></p>
        <button onclick="doLogout()" style="margin-top:10px;padding:10px 20px;background:#c0392b;border:none;border-radius:8px;color:#fff;cursor:pointer">Sign out</button>
      </div>
    </div>

  </div>

  <div class="bottom">
    <button onclick="showTab('tasks')" class="active" id="btn-tasks">Tasks</button>
    <button onclick="showTab('projects')" id="btn-projects">Fleet</button>
    <button onclick="showTab('budget')" id="btn-budget">Buy</button>
    <button onclick="showTab('tools')" id="btn-tools">All</button>
    <button onclick="showTab('settings')" id="btn-settings">Settings</button>
  </div>
</div>

<script>
const SUPA_URL = "https://fqmmlntmpybijmvrsfxx.supabase.co";
const SUPA_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZxbW1sbnRtcHliaWptdnJzZnh4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI4MTYyMzMsImV4cCI6MjA4ODM5MjIzM30.HeiCco9pyNwDKUJJhA5Af6Yh7AIRZH5GGlvr4BFOcXk";
const sb = window.supabase.createClient(SUPA_URL, SUPA_KEY);

let user = null;
let objs = [], tasks = [], taskIdx = 0;

// ── AUTH ──────────────────────────────────────────────────────────
async function googleLogin() {
  await sb.auth.signInWithOAuth({
    provider: 'google',
    options: { redirectTo: window.location.href }
  });
}

async function doLogout() {
  await sb.auth.signOut();
  location.reload();
}

// Handle session on load + after OAuth redirect
sb.auth.onAuthStateChange(async (event, session) => {
  if (session && session.user) {
    user = session.user;
    document.getElementById('loading').style.display = 'none';
    document.getElementById('login').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    document.getElementById('userInfo').textContent = user.email;
    await loadData();
  }
});

// Initial check (handles page reload when already logged in)
(async () => {
  const { data } = await sb.auth.getSession();
  if (!data.session) {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('login').style.display = 'flex';
  }
  // if session exists, onAuthStateChange fires automatically
})();

// ── DATA ──────────────────────────────────────────────────────────
async function loadData() {
  const [{ data: o }, { data: t }] = await Promise.all([
    sb.from('objects').select('*').eq('user_id', user.id).order('created_at'),
    sb.from('tasks').select('*').eq('user_id', user.id).order('created_at')
  ]);
  objs = o || [];
  tasks = t || [];
  taskIdx = 0;
  renderTask();
  renderProjects();
  renderBuy();
  renderAll();
}

// ── TASK CARD ─────────────────────────────────────────────────────
function getTodo() {
  const p = { H: 0, M: 1, L: 2 };
  return tasks.filter(t => t.status !== 'done').sort((a, b) => (p[a.priority] ?? 9) - (p[b.priority] ?? 9));
}

function renderTask() {
  const todo = getTodo();
  if (!todo.length) {
    document.getElementById('taskTitle').textContent = 'All done! 🎉';
    document.getElementById('taskMeta').textContent = '';
    document.getElementById('taskObj').textContent = '';
    document.getElementById('taskTags').innerHTML = '';
    document.getElementById('taskNote').textContent = '';
    document.getElementById('progress').style.width = '100%';
    return;
  }
  if (taskIdx >= todo.length) taskIdx = 0;
  const t = todo[taskIdx];
  const obj = objs.find(o => o.id === t.object_id);
  const pLabel = t.priority === 'H' ? 'urgent' : t.priority === 'M' ? 'normal' : 'low';

  document.getElementById('taskMeta').textContent = (taskIdx + 1) + ' / ' + todo.length;
  document.getElementById('taskTitle').textContent = t.title;
  document.getElementById('taskObj').textContent = obj ? obj.name : '';
  document.getElementById('taskTags').innerHTML =
    '<span class="tag">' + pLabel + '</span>' +
    (t.category ? '<span class="tag">' + t.category + '</span>' : '') +
    (t.youtube ? '<span class="tag">▶ YT</span>' : '');
  document.getElementById('taskNote').textContent = t.notes ? '→ ' + t.notes : '';

  // progress per object
  if (obj) {
    const objT = tasks.filter(x => x.object_id === obj.id);
    const done = objT.filter(x => x.status === 'done').length;
    const pct = objT.length ? Math.round(done / objT.length * 100) : 0;
    document.getElementById('progress').style.width = pct + '%';
  }
}

async function doneTask() {
  const todo = getTodo();
  if (!todo.length) return;
  const t = todo[taskIdx];
  await sb.from('tasks').update({ status: 'done', done_at: new Date().toISOString() }).eq('id', t.id);
  t.status = 'done'; t.priority = '';
  taskIdx = 0;
  renderTask();
  renderProjects();
  renderAll();
}

function skipTask() {
  const todo = getTodo();
  if (!todo.length) return;
  taskIdx = (taskIdx + 1) % todo.length;
  renderTask();
}

// ── FLEET ─────────────────────────────────────────────────────────
function renderProjects() {
  const el = document.getElementById('projects');
  el.innerHTML = objs.map(obj => {
    const ot = tasks.filter(t => t.object_id === obj.id);
    const done = ot.filter(t => t.status === 'done').length;
    const pct = ot.length ? Math.round(done / ot.length * 100) : 0;
    const urgent = ot.filter(t => t.status !== 'done' && t.priority === 'H').length;
    return '<div class="card" style="width:90%;margin-bottom:10px">' +
      '<h2>' + obj.name + '</h2>' +
      '<p style="font-size:13px;opacity:0.6">' + (ot.length - done) + ' tasks left' + (urgent ? ' · ' + urgent + ' urgent' : '') + '</p>' +
      '<div class="progress-container"><div class="progress-bar" style="width:' + pct + '%"></div></div>' +
      '</div>';
  }).join('');
}

// ── BUY LIST ──────────────────────────────────────────────────────
function renderBuy() {
  const items = tasks.filter(t => t.status !== 'done' && t.notes);
  const p = { H: 0, M: 1, L: 2 };
  items.sort((a, b) => (p[a.priority] ?? 9) - (p[b.priority] ?? 9));
  document.getElementById('buyList').innerHTML = items.length
    ? items.map(t => {
        const obj = objs.find(o => o.id === t.object_id);
        return '<p style="padding:8px 0;border-bottom:1px solid rgba(255,255,255,.08);font-size:14px">' +
          '→ ' + t.notes + '<br><span style="opacity:0.4;font-size:11px">' + (obj ? obj.name : '') + ' · ' + t.title + '</span></p>';
      }).join('')
    : '<p style="opacity:0.4">Nothing to buy</p>';
}

// ── ALL TASKS ─────────────────────────────────────────────────────
function renderAll() {
  const p = { H: 0, M: 1, L: 2 };
  const sorted = [...tasks].sort((a, b) => (p[a.priority] ?? 9) - (p[b.priority] ?? 9));
  document.getElementById('allTasks').innerHTML = sorted.map(t => {
    const obj = objs.find(o => o.id === t.object_id);
    const done = t.status === 'done';
    return '<p style="padding:8px 0;border-bottom:1px solid rgba(255,255,255,.08);font-size:14px;' + (done ? 'opacity:0.3;text-decoration:line-through' : '') + '">' +
      t.title + '<br><span style="opacity:0.4;font-size:11px">' + (obj ? obj.name : '') + (t.category ? ' · ' + t.category : '') + '</span></p>';
  }).join('');
}

// ── TABS ──────────────────────────────────────────────────────────
const tabIds = ['tasks', 'projects', 'budget', 'tools', 'settings'];

function showTab(tab) {
  tabIds.forEach(t => {
    document.getElementById(t).classList.add('hidden');
    document.getElementById('btn-' + t).classList.remove('active');
  });
  document.getElementById(tab).classList.remove('hidden');
  document.getElementById('btn-' + tab).classList.add('active');
}

// ── BACKGROUND ────────────────────────────────────────────────────
document.getElementById('bgUpload').addEventListener('change', function () {
  const reader = new FileReader();
  reader.onload = e => {
    document.getElementById('bg').src = e.target.result;
    localStorage.setItem('bg', e.target.result);
  };
  reader.readAsDataURL(this.files[0]);
});
const savedBg = localStorage.getItem('bg');
if (savedBg) document.getElementById('bg').src = savedBg;
</script>
</body>
</html>
