<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Garage Log</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
}

body{
height:100vh;
color:white;
overflow:hidden;
background:black;
}

#bg{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
z-index:-2;
}

#overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.55);
backdrop-filter:blur(6px);
z-index:-1;
}

.container{
padding:20px;
height:calc(100vh - 80px);
overflow:auto;
}

.card{
background:rgba(20,20,20,0.7);
backdrop-filter:blur(20px);
border-radius:18px;
padding:20px;
margin-bottom:20px;
box-shadow:0 8px 30px rgba(0,0,0,0.5);
}

.card h2{
font-size:22px;
margin-bottom:8px;
}

.card p{
opacity:0.8;
margin-bottom:6px;
}

.tag{
display:inline-block;
padding:4px 8px;
background:#444;
border-radius:6px;
font-size:12px;
margin-right:5px;
}

.bottom{
position:fixed;
bottom:0;
left:0;
width:100%;
height:70px;
background:rgba(0,0,0,0.6);
backdrop-filter:blur(10px);
display:flex;
justify-content:space-around;
align-items:center;
}

.bottom button{
background:none;
border:none;
color:white;
font-size:14px;
opacity:0.7;
}

.bottom button.active{
opacity:1;
font-weight:bold;
}

.hidden{
display:none;
}

/* task card swipe */
#taskCard{
touch-action:pan-y;
}

</style>
</head>

<body>

<img id="bg">
<div id="overlay"></div>

<div class="container">

<!-- TASKS -->
<div id="tasks">

<div class="card" id="taskCard">

<h2 id="taskTitle">Replace brake line</h2>
<p id="taskProject">BMW E28</p>

<div>
<span class="tag">priority: high</span>
<span class="tag">time: 2h</span>
</div>

<p style="margin-top:10px">
Tools: jack, flare wrench
</p>

<p>
Budget: €30
</p>

<div style="margin-top:14px;display:flex;gap:10px">
<button onclick="doneTask()" style="flex:1;padding:10px">Done</button>
<button onclick="skipTask()" style="flex:1;padding:10px">Skip</button>
<button onclick="alert('details')" style="flex:1;padding:10px">Details</button>
</div>

</div>

</div>

<!-- PROJECTS -->
<div id="projects" class="hidden">

<div class="card">
<h2>BMW E28</h2>
<p>Progress 42%</p>
</div>

<div class="card">
<h2>BMW F30</h2>
<p>Progress 10%</p>
</div>

<button onclick="alert('add project')" style="width:100%;padding:12px">
Add project
</button>

</div>

<!-- BUDGET -->
<div id="budget" class="hidden">

<div class="card">
<h2>Total spent</h2>
<p>BMW E28 — €820</p>
<p>Tools — €240</p>
</div>

<button onclick="alert('add expense')" style="width:100%;padding:12px">
Add expense
</button>

</div>

<!-- TOOLS -->
<div id="tools" class="hidden">

<div class="card">
<p>✓ compressor</p>
<p>✓ welder</p>
<p>✓ jack</p>
<p>✓ multimeter</p>
</div>

<button onclick="alert('add tool')" style="width:100%;padding:12px">
Add tool
</button>

</div>

<!-- SETTINGS -->
<div id="settings" class="hidden">

<div class="card">
<h2>Background</h2>
<input type="file" id="bgUpload">
</div>

<div class="card">
<h2>Import CSV</h2>
<input type="file" id="csvUpload">
</div>

</div>

</div>

<!-- BOTTOM NAV -->
<div class="bottom">

<button onclick="showTab('tasks')" class="active">Tasks</button>
<button onclick="showTab('projects')">Projects</button>
<button onclick="showTab('budget')">Budget</button>
<button onclick="showTab('tools')">Tools</button>
<button onclick="showTab('settings')">Settings</button>

</div>

<script>

let tabs = ["tasks","projects","budget","tools","settings"]

function showTab(tab){

tabs.forEach(t=>{
document.getElementById(t).classList.add("hidden")
})

document.getElementById(tab).classList.remove("hidden")

document.querySelectorAll(".bottom button").forEach(b=>b.classList.remove("active"))

event.target.classList.add("active")

}

// SWIPE UP / DOWN FOR TASKS
let startY=0
let card=document.getElementById("taskCard")

card.addEventListener("touchstart",e=>{
startY=e.touches[0].clientY
})

card.addEventListener("touchend",e=>{

let endY=e.changedTouches[0].clientY
let diff=startY-endY

if(diff>100){
nextTask()
}

if(diff<-100){
prevTask()
}

})

function nextTask(){
alert("next task")
}

function prevTask(){
alert("previous task")
}

function doneTask(){
alert("task done")
}

function skipTask(){
alert("task skipped")
}

// BACKGROUND
let bgUpload=document.getElementById("bgUpload")

bgUpload.addEventListener("change",function(){

let file=this.files[0]

let reader=new FileReader()

reader.onload=function(e){

document.getElementById("bg").src=e.target.result
localStorage.setItem("bg",e.target.result)

}

reader.readAsDataURL(file)

})

let savedBg=localStorage.getItem("bg")

if(savedBg){
document.getElementById("bg").src=savedBg
}

// CSV IMPORT (basic)
document.getElementById("csvUpload").addEventListener("change",function(){

let file=this.files[0]
let reader=new FileReader()

reader.onload=function(e){
let text=e.target.result
console.log(text)
alert("CSV loaded (see console)")
}

reader.readAsText(file)

})

</script>

</body>
</html>
