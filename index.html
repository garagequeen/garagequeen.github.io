<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Garage Log</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#111111">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
}

body{
background:#111;
color:white;
height:100vh;
overflow:hidden;
}

#bg{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
z-index:-2;
}

#overlay{
position:fixed;
inset:0;
background:rgba(0,0,0,0.55);
z-index:-1;
}

#login{
position:fixed;
inset:0;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
gap:20px;
background:#111;
}

button{
padding:10px 16px;
border:none;
border-radius:10px;
background:#3fb950;
color:white;
font-size:14px;
cursor:pointer;
margin-top:8px;
}

.container{
padding:20px;
height:100vh;
overflow:auto;
padding-bottom:80px;
}

.card{
background:rgba(30,30,30,0.85);
border-radius:16px;
padding:16px;
margin-bottom:14px;
}

input{
width:100%;
margin-top:10px;
padding:10px;
border-radius:8px;
border:none;
background:#222;
color:white;
}

img.taskphoto{
width:100%;
border-radius:10px;
margin-top:10px;
}

.gallery img{
width:100%;
border-radius:12px;
margin-bottom:12px;
}

.tabs{
position:fixed;
bottom:0;
left:0;
width:100%;
display:flex;
background:#000;
border-top:1px solid #222;
}

.tabs button{
flex:1;
background:none;
padding:14px;
font-size:14px;
color:white;
}

.focusCard{
font-size:20px;
text-align:center;
padding:30px;
}

</style>

</head>

<body>

<img id="bg">
<div id="overlay"></div>

<div id="login">
<h2>Garage Log</h2>
<button onclick="login()">Sign in with Google</button>
</div>

<div id="app" style="display:none">

<!-- FOCUS -->

<div id="focusTab" class="container">

<h2>Focus</h2>

<div id="focusTask"></div>

</div>

<!-- TASKS -->

<div id="tasksTab" class="container" style="display:none">

<h2>Tasks</h2>

<div class="card">

<input id="newTask" placeholder="New task">

<button onclick="addTask()">Add task</button>

</div>

<div id="tasks"></div>

</div>

<!-- PROJECTS -->

<div id="projectsTab" class="container" style="display:none">

<h2>Projects</h2>

<div class="card">

<input id="newProject" placeholder="Project name">

<button onclick="addProject()">Add project</button>

</div>

<div id="projects"></div>

</div>

<!-- GALLERY -->

<div id="galleryTab" class="container" style="display:none">

<h2>Work Gallery</h2>

<div id="gallery" class="gallery"></div>

</div>

<!-- SETTINGS -->

<div id="settingsTab" class="container" style="display:none">

<div class="card">

<h3>Background</h3>

<input type="file" id="bgUpload" accept="image/*">

</div>

</div>

<div class="tabs">

<button onclick="showTab('focus')">Focus</button>
<button onclick="showTab('tasks')">Tasks</button>
<button onclick="showTab('projects')">Projects</button>
<button onclick="showTab('gallery')">Gallery</button>
<button onclick="showTab('settings')">Settings</button>

</div>

</div>

<script>

const SUPA_URL = "https://fqmmlntmpybijmvrsfxx.supabase.co"
const SUPA_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZxbW1sbnRtcHliaWptdnJzZnh4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI4MTYyMzMsImV4cCI6MjA4ODM5MjIzM30.HeiCco9pyNwDKUJJhA5Af6Yh7AIRZH5GGlvr4BFOcXk"

const sb = supabase.createClient(SUPA_URL, SUPA_KEY)

let tasks = []
let projects = []
let user = null

function login(){

sb.auth.signInWithOAuth({
provider:"google",
options:{redirectTo:window.location.origin}
})

}

async function checkUser(){

const {data} = await sb.auth.getSession()

if(data.session){

user = data.session.user

document.getElementById("login").style.display="none"
document.getElementById("app").style.display="block"

loadTasks()
loadProjects()

}

}

checkUser()

async function loadTasks(){

const {data} = await sb
.from("tasks")
.select("*")
.order("created_at",{ascending:false})

tasks = data || []

renderTasks()
renderGallery()
renderFocus()

}

async function loadProjects(){

const {data} = await sb
.from("projects")
.select("*")
.order("created_at",{ascending:false})

projects = data || []

renderProjects()

}

function renderFocus(){

const el = document.getElementById("focusTask")

const task = tasks.find(t => !t.done)

if(!task){

el.innerHTML = `<div class="card focusCard">No tasks available</div>`
return

}

el.innerHTML = `
<div class="card focusCard">

<h2>${task.title}</h2>

<button onclick="completeTask('${task.id}')">
Complete
</button>

</div>
`

}

function renderTasks(){

const el = document.getElementById("tasks")

el.innerHTML=""

tasks.forEach(t=>{

const card = document.createElement("div")

card.className="card"

let photoButton=""

if(t.done){

photoButton=`
<input type="file" onchange="uploadPhoto(event,'${t.id}')">
`

}

card.innerHTML = `
<h3>${t.title}</h3>
<p>Status: ${t.done ? "Done" : "Open"}</p>

${!t.done ? `<button onclick="completeTask('${t.id}')">Complete</button>` : ""}

${photoButton}

${t.photo ? `<img class="taskphoto" src="${t.photo}">` : ""}
`

el.appendChild(card)

})

}

function renderProjects(){

const el = document.getElementById("projects")

el.innerHTML=""

projects.forEach(p=>{

const card = document.createElement("div")

card.className="card"

card.innerHTML = `
<h3>${p.title}</h3>
`

el.appendChild(card)

})

}

function renderGallery(){

const g = document.getElementById("gallery")

g.innerHTML=""

tasks
.filter(t=>t.photo)
.forEach(t=>{

const img = document.createElement("img")

img.src = t.photo

g.appendChild(img)

})

}

async function addTask(){

const title = document.getElementById("newTask").value

if(!title) return

await sb.from("tasks").insert({
title:title,
user_id:user.id
})

document.getElementById("newTask").value=""

loadTasks()

}

async function addProject(){

const title = document.getElementById("newProject").value

if(!title) return

await sb.from("projects").insert({
title:title,
user_id:user.id
})

document.getElementById("newProject").value=""

loadProjects()

}

async function completeTask(id){

await sb
.from("tasks")
.update({done:true})
.eq("id",id)

loadTasks()

}

function compressImage(file){

return new Promise(resolve=>{

const img = new Image()
const reader = new FileReader()

reader.onload = e => img.src = e.target.result

img.onload = ()=>{

const canvas = document.createElement("canvas")

const MAX = 1600

let w = img.width
let h = img.height

if(w > MAX){
h *= MAX / w
w = MAX
}

canvas.width = w
canvas.height = h

const ctx = canvas.getContext("2d")

ctx.drawImage(img,0,0,w,h)

canvas.toBlob(resolve,"image/jpeg",0.8)

}

reader.readAsDataURL(file)

})

}

async function uploadPhoto(e,id){

let file = e.target.files[0]

if(!file) return

file = await compressImage(file)

const name = id + "-" + Date.now() + ".jpg"

await sb.storage
.from("taskphotos")
.upload(name,file)

const {data} = sb.storage
.from("taskphotos")
.getPublicUrl(name)

await sb
.from("tasks")
.update({photo:data.publicUrl})
.eq("id",id)

loadTasks()

}

function showTab(tab){

document.getElementById("focusTab").style.display="none"
document.getElementById("tasksTab").style.display="none"
document.getElementById("projectsTab").style.display="none"
document.getElementById("galleryTab").style.display="none"
document.getElementById("settingsTab").style.display="none"

document.getElementById(tab+"Tab").style.display="block"

}

document.getElementById("bgUpload").addEventListener("change",function(){

const reader = new FileReader()

reader.onload = e =>{

document.getElementById("bg").src = e.target.result
localStorage.setItem("bg",e.target.result)

}

reader.readAsDataURL(this.files[0])

})

const bg = localStorage.getItem("bg")

if(bg){
document.getElementById("bg").src = bg
}

if("serviceWorker" in navigator){
navigator.serviceWorker.register("sw.js")
}

</script>

</body>
</html>
