<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>Garage Log</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#111111">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;-webkit-user-select:none;user-select:none;}
html,body{margin:0;padding:0;background:#000;color:white;height:100%;overflow:hidden;}
#bg{position:fixed;top:0;left:0;width:100vw;height:100vh;height:100dvh;object-fit:cover;object-position:center top;z-index:-2;}
#overlay{position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:-1;}
#login{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;background:#111;padding-top:env(safe-area-inset-top);}
button{padding:10px 16px;border:none;border-radius:10px;background:#3fb950;color:white;font-size:14px;cursor:pointer;margin-top:8px;}
.container{padding:20px;height:100vh;overflow-y:auto;overflow-x:hidden;padding-bottom:90px;-webkit-overflow-scrolling:touch;}
.container::-webkit-scrollbar{display:none;}
.container{scrollbar-width:none;}
.container > h2{margin-top:max(env(safe-area-inset-top),44px);margin-bottom:14px;}
.container > .filter-tabs{margin-top:max(env(safe-area-inset-top),44px);}
.card{background:rgba(30,30,30,0.85);border-radius:16px;padding:16px;margin-bottom:14px;}
input,select,textarea{width:100%;margin-top:10px;padding:10px;border-radius:8px;border:none;background:#222;color:white;font-size:14px;-webkit-user-select:text;user-select:text;}
textarea{height:100px;resize:none;}
.tabs{position:fixed;bottom:0;left:0;width:100%;display:flex;background:#000;border-top:1px solid #222;padding-bottom:env(safe-area-inset-bottom);}
.tabs button{flex:1;background:none;padding:10px 4px;font-size:11px;color:white;margin-top:0;border-radius:0;}
.tabs button.active{color:#3fb950;}
#projectDetail{position:fixed;inset:0;background:#111;z-index:50;display:none;flex-direction:column;overflow-y:auto;}
#projectDetail.open{display:flex;}
#projectDetail::-webkit-scrollbar{display:none;}
.detail-header{display:flex;align-items:center;gap:8px;padding:16px 20px;padding-top:calc(16px + env(safe-area-inset-top));border-bottom:1px solid #222;position:sticky;top:0;background:#111;z-index:10;}
.back-btn{background:none;border:none;color:#aaa;font-size:22px;cursor:pointer;margin-top:0;padding:0;}
.detail-title{font-size:18px;font-weight:600;}
.detail-actions{margin-left:auto;display:flex;gap:6px;}
.detail-actions button{margin-top:0;font-size:12px;padding:6px 10px;}
.btn-danger{background:#c0392b !important;}
.btn-secondary{background:#333 !important;}

/* Project card with color stripe */
.project-card{background:rgba(30,30,30,0.85);border-radius:16px;padding:16px;margin-bottom:14px;cursor:pointer;display:flex;align-items:stretch;gap:0;overflow:hidden;}
.project-stripe{width:5px;border-radius:3px;margin-right:14px;flex-shrink:0;min-height:100%;}
.project-info{flex:1;}
.project-title{font-size:16px;font-weight:600;}
.project-meta{font-size:12px;color:#666;margin-top:4px;}
.project-colors{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap;}
.color-dot{width:22px;height:22px;border-radius:50%;cursor:pointer;border:2px solid transparent;}
.color-dot.selected{border-color:white;}

.task-card{background:rgba(30,30,30,0.85);border-radius:16px;padding:14px 16px;margin-bottom:10px;display:flex;align-items:flex-start;gap:12px;}
.task-check{width:22px;height:22px;min-width:22px;border:2px solid #444;border-radius:6px;cursor:pointer;display:flex;align-items:center;justify-content:center;background:none;padding:0;margin-top:1px;}
.task-check.done{background:#3fb950;border-color:#3fb950;}
.task-check.done::after{content:‘✓’;font-size:12px;color:#111;font-weight:700;}
.task-body{flex:1;}
.task-title{font-size:15px;line-height:1.4;}
.task-title.done{text-decoration:line-through;color:#666;}
.task-meta{font-size:12px;color:#666;margin-top:4px;}
.category-header{font-size:11px;color:#555;text-transform:uppercase;letter-spacing:0.08em;padding:16px 0 6px;font-weight:600;}
.sheet-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:100;display:none;align-items:flex-end;}
.sheet-overlay.open{display:flex;}
.sheet{background:#1a1a1a;border-radius:20px 20px 0 0;padding:20px;width:100%;border-top:1px solid #333;animation:slideUp 0.25s ease;max-height:90vh;overflow-y:auto;}
@keyframes slideUp{from{transform:translateY(100%);}to{transform:translateY(0);}}
.sheet-handle{width:36px;height:3px;background:#333;border-radius:2px;margin:0 auto 16px;}
.sheet h3{font-size:16px;margin-bottom:4px;}
.sheet button{width:100%;}
.btn-cancel{background:#333 !important;margin-top:8px;}
.confirm-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.8);z-index:200;display:none;align-items:center;justify-content:center;padding:24px;}
.confirm-overlay.open{display:flex;}
.confirm-box{background:#1a1a1a;border-radius:16px;padding:24px;width:100%;max-width:320px;}
.confirm-box h3{font-size:16px;margin-bottom:8px;}
.confirm-box p{font-size:13px;color:#aaa;margin-bottom:20px;line-height:1.5;}
.confirm-actions{display:flex;gap:8px;}
.confirm-actions button{flex:1;margin-top:0;}
.focus-card{background:rgba(30,30,30,0.85);border-radius:16px;padding:20px;margin-bottom:14px;}
.focus-project{font-size:11px;color:#3fb950;letter-spacing:0.05em;margin-bottom:6px;}
.focus-category{font-size:11px;color:#666;letter-spacing:0.03em;}
.focus-title{font-size:22px;font-weight:600;margin-bottom:8px;}
.focus-notes{font-size:13px;color:#aaa;margin-bottom:16px;line-height:1.5;}
.focus-actions{display:flex;gap:8px;}
.focus-actions button{flex:1;margin-top:0;}
.btn-skip{background:#333 !important;}
.focus-count{font-size:12px;color:#555;padding:4px 0 8px;}
.empty{text-align:center;padding:60px 20px;color:#555;line-height:1.6;}
.version{text-align:center;font-size:11px;color:#333;padding:24px 0 4px;}

/* Import */
.import-item{display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:1px solid #222;}
.import-item:last-child{border-bottom:none;}
.import-check{width:20px;height:20px;min-width:20px;accent-color:#3fb950;margin-top:2px;}
.import-label{flex:1;font-size:14px;line-height:1.4;}
.import-label small{color:#555;font-size:11px;display:block;margin-top:2px;}
.import-done{text-decoration:line-through;color:#555;}
.import-category-header{font-size:11px;color:#3fb950;text-transform:uppercase;letter-spacing:0.08em;padding:14px 0 4px;font-weight:600;}
.import-count{font-size:13px;color:#aaa;margin:8px 0 12px;}

/* Inventory */
.inv-card{background:rgba(30,30,30,0.85);border-radius:16px;padding:14px 16px;margin-bottom:10px;cursor:pointer;}
.inv-name{font-size:15px;font-weight:500;}
.inv-meta{font-size:12px;color:#666;margin-top:4px;}
.inv-status{display:inline-block;padding:2px 8px;border-radius:6px;font-size:11px;font-weight:600;margin-top:6px;}
.inv-status.have{background:#1a3a1a;color:#3fb950;}
.inv-status.low{background:#3a2a00;color:#f0a500;}
.inv-status.missing{background:#3a1a1a;color:#c0392b;}
.filter-tabs{display:flex;gap:8px;margin-bottom:14px;overflow-x:auto;padding-bottom:4px;}
.filter-tab{background:#222;border:none;color:#aaa;padding:6px 14px;border-radius:20px;font-size:13px;white-space:nowrap;margin-top:0;}
.filter-tab.active{background:#3fb950;color:#111;}

/* Toast */
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:#333;color:white;padding:10px 20px;border-radius:20px;font-size:13px;z-index:300;opacity:0;transition:opacity 0.3s;pointer-events:none;}
.toast.show{opacity:1;}
</style>

</head>
<body>

<img id="bg">
<div id="overlay"></div>
<div class="toast" id="toast"></div>

<div id="login">
  <h2>Garage Log</h2>
  <button onclick="login()">Sign in with Google</button>
</div>

<div id="app" style="display:none">
  <div id="focusTab" class="container">
    <h2>Focus</h2>
    <div id="focusContent"></div>
  </div>

  <div id="tasksTab" class="container" style="display:none">
    <h2>Tasks</h2>
    <input id="taskSearch" placeholder="🔍 Search tasks..." oninput="renderAllTasks()" style="margin-bottom:10px">
    <div class="filter-tabs" id="taskProjectFilter">
      <button class="filter-tab active" onclick="setTaskFilter(null,this)">All</button>
    </div>
    <div id="allTasksList"></div>
  </div>

  <div id="projectsTab" class="container" style="display:none">
    <h2>Projects</h2>
    <div id="projectsList"></div>
    <div class="card">
      <input id="newProject" placeholder="New project name" oninput="toggleAddProject()">
      <button onclick="addProject()" id="addProjectBtn" style="opacity:0.4;pointer-events:none">Add project</button>
    </div>
  </div>

  <div id="inventoryTab" class="container" style="display:none">
    <h2>Inventory</h2>
    <div class="filter-tabs">
      <button class="filter-tab active" onclick="setInvFilter('all',this)">All</button>
      <button class="filter-tab" onclick="setInvFilter('part',this)">Parts</button>
      <button class="filter-tab" onclick="setInvFilter('tool',this)">Tools</button>
      <button class="filter-tab" onclick="setInvFilter('consumable',this)">Consumables</button>
    </div>
    <div id="inventoryList"></div>
    <button onclick="openAddInventory()" style="width:100%;margin-top:4px">+ Add item</button>
  </div>

  <div id="settingsTab" class="container" style="display:none">
    <div class="card">
      <h3>Account</h3>
      <p id="userEmail" style="color:#aaa;margin-top:8px;font-size:14px"></p>
      <button onclick="logout()">Logout</button>
    </div>
    <div class="card">
      <h3>Background</h3>
      <input type="file" id="bgUpload" accept="image/*" style="display:none">
      <button onclick="document.getElementById('bgUpload').click()" style="margin-top:10px;background:#333" id="bgBtn">Choose photo</button>
      <div id="bgName" style="font-size:12px;color:#555;margin-top:6px"></div>
    </div>
    <div class="card">
      <h3>Feedback</h3>
      <button onclick="openFeedback('bug')" style="background:#c0392b;margin-top:10px">🐛 Problem</button>
      <button onclick="openFeedback('idea')" style="margin-top:8px">💡 Idea</button>
    </div>
    <div class="version">v0.3.6</div>
  </div>

  <div class="tabs">
    <button id="tab-focus" class="active" onclick="showTab('focus')">Focus</button>
    <button id="tab-tasks" onclick="showTab('tasks')">Tasks</button>
    <button id="tab-projects" onclick="showTab('projects')">Projects</button>
    <button id="tab-inventory" onclick="showTab('inventory')">Inventory</button>
    <button id="tab-settings" onclick="showTab('settings')">Settings</button>
  </div>
</div>

<!-- PROJECT DETAIL -->

<div id="projectDetail">
  <div class="detail-header">
    <button class="back-btn" onclick="closeDetail()">←</button>
    <div class="detail-title" id="detailTitle"></div>
    <div class="detail-actions">
      <button class="btn-secondary" onclick="openRenameProject()">Rename</button>
      <button class="btn-secondary" onclick="openImport()">Import</button>
      <button onclick="openAddTask()">+ Task</button>
      <button class="btn-danger" onclick="confirmDelete()">Delete</button>
    </div>
  </div>
  <div style="padding:16px" id="tasksList"></div>
</div>

<!-- ADD TASK -->

<div class="sheet-overlay" id="addTaskSheet" onclick="closeIfBg(event,'addTaskSheet')">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <h3>New task</h3>
    <input id="newTaskTitle" placeholder="Task name" autocomplete="off">
    <input id="newTaskCategory" placeholder="Category (optional)" autocomplete="off">
    <select id="newTaskPriority">
      <option value="">Priority (optional)</option>
      <option value="high">High</option>
      <option value="medium">Medium</option>
      <option value="low">Low</option>
    </select>
    <textarea id="newTaskNotes" placeholder="Notes (optional)" style="height:60px"></textarea>
    <button onclick="addTask()" style="margin-top:12px">Add task</button>
    <button class="btn-cancel" onclick="closeSheet('addTaskSheet')">Cancel</button>
  </div>
</div>

<!-- IMPORT TASKS -->

<div class="sheet-overlay" id="importSheet" onclick="closeIfBg(event,'importSheet')">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div id="importStep1">
      <h3>Import tasks</h3>
      <p style="font-size:13px;color:#666;margin-top:6px">Paste your notes. Lines with - [ ] or - [x] become tasks. Headers become categories.</p>
      <textarea id="importText" placeholder="- [ ] fix radiator&#10;- [x] change oil&#10;&#10;Cooling system&#10;- [ ] flush coolant" style="height:160px;margin-top:12px"></textarea>
      <button onclick="parseImport()" style="margin-top:12px">Parse →</button>
      <button class="btn-cancel" onclick="closeSheet('importSheet')">Cancel</button>
    </div>
    <div id="importStep2" style="display:none">
      <h3>Review tasks</h3>
      <div id="importCount" class="import-count"></div>
      <div id="importPreview"></div>
      <button onclick="doImport()" id="importBtn" style="margin-top:12px">Import</button>
      <button class="btn-cancel" onclick="backToImportStep1()">← Back</button>
    </div>
  </div>
</div>

<!-- ADD/EDIT INVENTORY -->

<div class="sheet-overlay" id="addInventorySheet" onclick="closeIfBg(event,'addInventorySheet')">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <h3 id="invSheetTitle">New item</h3>
    <input id="invName" placeholder="Item name" autocomplete="off">
    <select id="invType">
      <option value="part">Part</option>
      <option value="tool">Tool</option>
      <option value="consumable">Consumable</option>
    </select>
    <select id="invStatus">
      <option value="have">Have it</option>
      <option value="low">Running low</option>
      <option value="missing">Missing</option>
    </select>
    <input id="invQty" placeholder="Quantity (optional)" type="number" min="0">
    <input id="invLocation" placeholder="Location (optional)" autocomplete="off">
    <button onclick="saveInventoryItem()" style="margin-top:12px" id="invSaveBtn">Add item</button>
    <button class="btn-danger" id="invDeleteBtn" style="display:none;margin-top:8px" onclick="deleteCurrentInvItem()">Delete item</button>
    <button class="btn-cancel" onclick="closeSheet('addInventorySheet')">Cancel</button>
  </div>
</div>

<!-- CONFIRM -->

<div class="confirm-overlay" id="confirmOverlay">
  <div class="confirm-box">
    <h3 id="confirmTitle"></h3>
    <p id="confirmText"></p>
    <div class="confirm-actions">
      <button style="background:#333;margin-top:0" onclick="closeConfirm()">Cancel</button>
      <button class="btn-danger" style="margin-top:0" id="confirmOk">Delete</button>
    </div>
  </div>
</div>

<!-- EDIT TASK -->

<div class="sheet-overlay" id="editTaskSheet" onclick="closeIfBg(event,'editTaskSheet')">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <h3>Edit task</h3>
    <input id="editTaskTitle" placeholder="Task name" autocomplete="off">
    <input id="editTaskCategory" placeholder="Category (optional)" autocomplete="off">
    <select id="editTaskPriority">
      <option value="">Priority (optional)</option>
      <option value="high">High</option>
      <option value="medium">Medium</option>
      <option value="low">Low</option>
    </select>
    <textarea id="editTaskNotes" placeholder="Notes (optional)" style="height:60px"></textarea>
    <input id="editTaskBlocked" placeholder="Blocked reason (leave empty to unblock)" autocomplete="off">
    <button onclick="saveEditTask()" style="margin-top:12px">Save</button>
    <button class="btn-danger" style="margin-top:8px" onclick="deleteEditTask()">Delete task</button>
    <button class="btn-cancel" onclick="closeSheet('editTaskSheet')">Cancel</button>
  </div>
</div>

<!-- RENAME PROJECT -->

<div class="sheet-overlay" id="renameProjectSheet" onclick="closeIfBg(event,'renameProjectSheet')">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <h3>Rename project</h3>
    <input id="renameProjectInput" placeholder="Project name" autocomplete="off">
    <h3 style="margin-top:16px;font-size:13px;color:#aaa">Color</h3>
    <div class="project-colors" id="colorPicker"></div>
    <button onclick="saveRenameProject()" style="margin-top:12px">Save</button>
    <button class="btn-cancel" onclick="closeSheet('renameProjectSheet')">Cancel</button>
  </div>
</div>

<!-- FEEDBACK -->

<div class="sheet-overlay" id="feedbackSheet" onclick="closeIfBg(event,'feedbackSheet')">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <h3 id="feedbackSheetTitle">Feedback</h3>
    <textarea id="feedbackText" style="margin-top:12px"></textarea>
    <button onclick="submitFeedback()" style="margin-top:12px">Send</button>
    <button class="btn-cancel" onclick="closeSheet('feedbackSheet')">Cancel</button>
  </div>
</div>

<script>
const SUPA_URL = "https://fqmmlntmpybijmvrsfxx.supabase.co"
const SUPA_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZxbW1sbnRtcHliaWptdnJzZnh4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI4MTYyMzMsImV4cCI6MjA4ODM5MjIzM30.HeiCco9pyNwDKUJJhA5Af6Yh7AIRZH5GGlvr4BFOcXk"
const sb = supabase.createClient(SUPA_URL, SUPA_KEY, { auth: { flowType: 'pkce' } })

const PROJECT_COLORS = ['#3fb950','#f0a500','#c0392b','#3498db','#9b59b6','#1abc9c','#e67e22','#e91e63']

let user = null, projects = [], tasks = [], inventory = [], currentProject = null, invFilter = 'all', editingInvItem = null, taskProjectFilter = null

function login() {
  sb.auth.signInWithOAuth({ provider:"google", options:{ redirectTo: window.location.origin } })
}
async function logout() { await sb.auth.signOut(); location.reload() }

async function checkUser() {
  const { data } = await sb.auth.getSession()
  if (data.session) {
    user = data.session.user
    document.getElementById("login").style.display = "none"
    document.getElementById("app").style.display = "block"
    document.getElementById("userEmail").innerText = user.email
    await loadBg()
    await loadAll()
  }
}
sb.auth.onAuthStateChange((_e, s) => { if (s && !user) checkUser() })
checkUser()

// ── BACKGROUND (Supabase Storage) ──
async function loadBg() {
  try {
    const { data } = await sb.storage.from('backgrounds').download(`${user.id}/bg`)
    if (data) {
      const url = URL.createObjectURL(data)
      document.getElementById("bg").src = url
    }
  } catch(e) {
    // fallback to localStorage
    const bg = localStorage.getItem("bg")
    if (bg) document.getElementById("bg").src = bg
  }
}

document.getElementById("bgUpload").addEventListener("change", async function() {
  const file = this.files[0]
  if (!file) return
  const localUrl = URL.createObjectURL(file)
  document.getElementById("bg").src = localUrl
  document.getElementById("bgName").innerText = file.name
  try {
    const { error } = await sb.storage.from('backgrounds').upload(`${user.id}/bg`, file, { upsert: true, contentType: file.type })
    if (error) throw error
    showToast("Background saved ✓")
  } catch(e) {
    const r2 = new FileReader()
    r2.onload = ev => localStorage.setItem("bg", ev.target.result)
    r2.readAsDataURL(file)
    showToast("Background saved locally ✓")
  }
})

// ── TOAST ──
function showToast(msg, duration=2000) {
  const t = document.getElementById("toast")
  t.innerText = msg
  t.classList.add("show")
  setTimeout(() => t.classList.remove("show"), duration)
}

async function loadAll() {
  const [p, t, inv] = await Promise.all([
    sb.from("projects").select("*").eq("user_id", user.id).order("created_at", { ascending: false }),
    sb.from("tasks").select("*").eq("user_id", user.id).order("created_at", { ascending: false }),
    sb.from("inventory").select("*").eq("user_id", user.id).order("created_at", { ascending: false })
  ])
  projects = p.data || []
  tasks = t.data || []
  inventory = inv.data || []
  renderProjects()
  renderFocus()
  renderAllTasks()
  renderInventory()
  if (currentProject) renderTasks()
  if (!projects.length && !user._initialLoadDone) { user._initialLoadDone = true; showTab("projects") }
  user._initialLoadDone = true
}

// ── PROJECTS ──
function renderProjects() {
  const el = document.getElementById("projectsList")
  if (!projects.length) { el.innerHTML = `<div class="empty">No projects yet.<br>Add your first one below.</div>`; return }
  el.innerHTML = ""
  projects.forEach(p => {
    const open = tasks.filter(t => t.project_id === p.id && t.status !== "done").length
    const done = tasks.filter(t => t.project_id === p.id && t.status === "done").length
    const color = p.color || '#3fb950'
    const d = document.createElement("div")
    d.className = "project-card"
    d.innerHTML = `
      <div class="project-stripe" style="background:${color}"></div>
      <div class="project-info">
        <div class="project-title">${p.title}</div>
        <div class="project-meta">${open} open${done?" · "+done+" done":""}</div>
      </div>`
    d.onclick = () => openDetail(p)
    el.appendChild(d)
  })
  // Rebuild task project filter
  const pf = document.getElementById("taskProjectFilter")
  if (pf) {
    pf.innerHTML = `<button class="filter-tab${!taskProjectFilter?" active":""}" onclick="setTaskFilter(null,this)">All</button>`
    projects.forEach(p => {
      const btn = document.createElement("button")
      btn.className = "filter-tab" + (taskProjectFilter===p.id?" active":"")
      btn.style.borderBottom = `2px solid ${p.color||'#3fb950'}`
      btn.innerText = p.title
      btn.onclick = () => setTaskFilter(p.id, btn)
      pf.appendChild(btn)
    })
  }
}

function toggleAddProject() {
  const val = document.getElementById("newProject").value.trim()
  const btn = document.getElementById("addProjectBtn")
  btn.style.opacity = val ? "1" : "0.4"
  btn.style.pointerEvents = val ? "auto" : "none"
}

async function addProject() {
  const title = document.getElementById("newProject").value.trim()
  if (!title) return
  const duplicate = projects.find(p => p.title.toLowerCase() === title.toLowerCase())
  if (duplicate) { showToast(`"${title}" already exists`); return }
  await sb.from("projects").insert({ title, user_id: user.id, color: PROJECT_COLORS[projects.length % PROJECT_COLORS.length] })
  document.getElementById("newProject").value = ""
  toggleAddProject()
  await loadAll()
}

async function deleteProject(id) {

  await sb.from("projects").delete().eq("id", id).eq("user_id", user.id)
  closeDetail()

// ── PROJECT DETAIL ──
function openDetail(p) {
  currentProject = p
  document.getElementById("detailTitle").innerText = p.title
  document.getElementById("projectDetail").classList.add("open")
  renderTasks()
}
function closeDetail() { document.getElementById("projectDetail").classList.remove("open"); currentProject = null }

function renderTasks() {
  const el = document.getElementById("tasksList")
  const pt = tasks.filter(t => t.project_id === currentProject?.id)
  if (!pt.length) { el.innerHTML = `<div class="empty">No tasks yet.<br>Tap "+ Task" or Import.</div>`; return }
  el.innerHTML = ""
  const open = pt.filter(t => t.status !== "done")
  const done = pt.filter(t => t.status === "done")
  const grouped = {}
  ;[...open, ...done].forEach(t => {
    const cat = t.category || ""
    if (!grouped[cat]) grouped[cat] = []
    grouped[cat].push(t)
  })
  Object.keys(grouped).forEach(cat => {
    if (cat) {
      const h = document.createElement("div")
      h.className = "category-header"
      h.innerText = cat
      el.appendChild(h)
    }
    grouped[cat].forEach(t => {
      el.appendChild(makeTaskCard(t))
    })
  })
}

function openAddTask() {
  document.getElementById("addTaskSheet").classList.add("open")
  setTimeout(() => document.getElementById("newTaskTitle").focus(), 300)
}

async function addTask() {
  const title = document.getElementById("newTaskTitle").value.trim()
  if (!title || !currentProject) return
  await sb.from("tasks").insert({
    title, user_id: user.id, project_id: currentProject.id,
    category: document.getElementById("newTaskCategory").value.trim() || null,
    priority: document.getElementById("newTaskPriority").value || null,
    notes: document.getElementById("newTaskNotes").value.trim() || null,
    status: "open"
  })
  document.getElementById("newTaskTitle").value = ""
  document.getElementById("newTaskCategory").value = ""
  document.getElementById("newTaskNotes").value = ""
  document.getElementById("newTaskPriority").value = ""
  closeSheet("addTaskSheet")
  await loadAll()
}

async function completeTask(id) {
  const task = tasks.find(t => t.id === id)
  if (!task) return
  const isDone = task.status === "done"
  await sb.from("tasks").update(
    isDone ? { status:"open", done_at: null } : { status:"done", done_at: new Date().toISOString() }
  ).eq("id", id).eq("user_id", user.id)
  if (!isDone) showToast("✓ Done!")
  await loadAll()
}

// ── IMPORT ──
let parsedImportItems = []

function openImport() {
  document.getElementById("importStep1").style.display = "block"
  document.getElementById("importStep2").style.display = "none"
  document.getElementById("importText").value = ""
  document.getElementById("importSheet").classList.add("open")
}

function backToImportStep1() {
  document.getElementById("importStep1").style.display = "block"
  document.getElementById("importStep2").style.display = "none"
}

function parseImport() {
  const text = document.getElementById("importText").value
  const lines = text.split("\n")
  parsedImportItems = []
  let currentCategory = ""

  lines.forEach(line => {
    const trimmed = line.trim()
    if (!trimmed) return
    const openMatch = trimmed.match(/^-\s\[\s\]\s+(.+)/)
    const doneMatch = trimmed.match(/^-\s\[x\]\s+(.+)/i)
    if (openMatch || doneMatch) {
      const raw = (openMatch || doneMatch)[1]
      const notesMatch = raw.match(/\(([^)]+)\)/)
      const notes = notesMatch ? notesMatch[1] : null
      const title = raw.replace(/\([^)]+\)/g, "").trim()
      if (!title) return
      const isDup = tasks.some(t => t.project_id === currentProject?.id && t.title.toLowerCase() === title.toLowerCase())
      parsedImportItems.push({ title, notes, status: doneMatch ? "done" : "open", category: currentCategory, selected: !isDup, duplicate: isDup, partNumber: null })
    } else if (!trimmed.startsWith("-") && trimmed.length > 0) {
      // Ignore lines that are only digits/article numbers - attach to last task instead
      if (/^\d{4,}$/.test(trimmed)) {
        if (parsedImportItems.length > 0) {
          const last = parsedImportItems[parsedImportItems.length - 1]
          last.partNumber = trimmed
        }
      } else {
        currentCategory = trimmed
      }
    }
  })

  if (!parsedImportItems.length) { showToast("No tasks found"); return }
  renderImportPreview()
  document.getElementById("importStep1").style.display = "none"
  document.getElementById("importStep2").style.display = "block"
}

function renderImportPreview() {
  const el = document.getElementById("importPreview")
  el.innerHTML = ""
  const selected = parsedImportItems.filter(i => i.selected).length
  document.getElementById("importCount").innerText = `${selected} tasks selected`
  document.getElementById("importBtn").innerText = `Import ${selected} tasks`
  const grouped = {}
  parsedImportItems.forEach((item, idx) => {
    const cat = item.category || ""
    if (!grouped[cat]) grouped[cat] = []
    grouped[cat].push({ ...item, idx })
  })
  Object.keys(grouped).forEach(cat => {
    if (cat) {
      const h = document.createElement("div")
      h.className = "import-category-header"
      h.innerText = cat
      el.appendChild(h)
    }
    grouped[cat].forEach(({ title, notes, status, selected, duplicate, partNumber, idx }) => {
      const d = document.createElement("div")
      d.className = "import-item"
      d.innerHTML = `
        <input type="checkbox" class="import-check" ${selected?"checked":""} ${duplicate?"disabled":""} onchange="toggleImportItem(${idx}, this.checked)">
        <div class="import-label ${status==='done'||duplicate?'import-done':''}">
          ${title}${duplicate?' <small style="color:#555">already exists</small>':""}
          ${notes&&!duplicate?`<small>${notes}</small>`:""}
          ${partNumber?`<small style="color:#3fb950">🔩 ${partNumber} <label style="color:#aaa"><input type="checkbox" onchange="togglePartNumber(${idx},this.checked)" style="width:auto;margin:0 4px 0 6px;accent-color:#3fb950"> add to Parts</label></small>`:""}
        </div>`
      el.appendChild(d)
    })
  })
}

function togglePartNumber(idx, checked) {
  parsedImportItems[idx].addToParts = checked
}

function toggleImportItem(idx, checked) {
  parsedImportItems[idx].selected = checked
  const selected = parsedImportItems.filter(i => i.selected).length
  document.getElementById("importCount").innerText = `${selected} tasks selected`
  document.getElementById("importBtn").innerText = `Import ${selected} tasks`
}

async function doImport() {
  const toInsert = parsedImportItems.filter(i => i.selected).map(i => ({
    title: i.title, notes: i.notes || null, status: i.status,
    category: i.category || null,
    done_at: i.status === "done" ? new Date().toISOString() : null,
    user_id: user.id, project_id: currentProject.id
  }))
  if (!toInsert.length) return
  await sb.from("tasks").insert(toInsert)

  // Insert part numbers to inventory
  const parts = parsedImportItems.filter(i => i.addToParts && i.partNumber)
  if (parts.length) {
    await sb.from("inventory").insert(parts.map(i => ({
      name: i.title,
      type: "part",
      status: "missing",
      quantity: null,
      location: i.partNumber,
      user_id: user.id
    })))
  }

  closeSheet("importSheet")
  const msg = parts.length ? `${toInsert.length} tasks + ${parts.length} parts imported ✓` : `${toInsert.length} tasks imported ✓`
  showToast(msg)
  await loadAll()
}

// ── TASK CARD (shared) ──
function makeTaskCard(t, proj) {
  const isDone = t.status === "done"
  const isBlocked = !!t.blocked_reason
  const pm = {}; projects.forEach(p => pm[p.id] = p)
  const project = proj || pm[t.project_id]
  const projColor = project?.color || '#3fb950'

  const wrapper = document.createElement("div")
  wrapper.style.cssText = "position:relative;overflow:hidden;border-radius:16px;margin-bottom:10px;"

  const deleteBg = document.createElement("div")
  deleteBg.style.cssText = "position:absolute;right:0;top:0;bottom:0;width:60px;background:#c0392b;display:flex;align-items:center;justify-content:center;font-size:12px;color:white;font-weight:600;border-radius:0 16px 16px 0;"
  deleteBg.innerText = "Delete"

  const card = document.createElement("div")
  card.className = "task-card"
  card.style.cssText = "margin-bottom:0;border-radius:16px;transition:transform 0.2s;position:relative;z-index:1;background:rgba(30,30,30,0.85);"
  if (isBlocked) card.style.opacity = "0.6"

  const metaLine = proj
    ? `<span style="color:${projColor}">${project.title}</span>${t.category?` <span style="color:#555">· ${t.category}</span>`:""}${t.priority?` · ${t.priority}`:""}`
    : `${t.priority||""}${t.notes?(t.priority?" · ":"")+t.notes:""}`

  card.innerHTML = `
    <div class="task-check${isDone?" done":""}" onclick="event.stopPropagation();completeTask('${t.id}')"></div>
    <div class="task-body">
      <div class="task-title${isDone?" done":""}${isBlocked?" blocked":""}">${t.title}${isBlocked?` <span style="font-size:11px;color:#f0a500;background:#3a2a00;padding:1px 6px;border-radius:4px;margin-left:4px">blocked</span>`:""}</div>
      ${metaLine?`<div class="task-meta">${metaLine}</div>`:""}
      ${isBlocked&&t.blocked_reason?`<div class="task-meta" style="color:#f0a500">${t.blocked_reason}</div>`:""}
    </div>`

  card.querySelector(".task-body").onclick = () => openEditTask(t)

  let startX = 0, currentX = 0, swiping = false
  card.addEventListener("touchstart", e => { startX = e.touches[0].clientX; swiping = true; currentX = 0 }, { passive: true })
  card.addEventListener("touchmove", e => {
    if (!swiping) return
    currentX = e.touches[0].clientX - startX
    if (currentX < 0) card.style.transform = `translateX(${Math.max(currentX, -60)}px)`
  }, { passive: true })
  card.addEventListener("touchend", () => {
    swiping = false
    if (currentX < -40) {
      card.style.transform = "translateX(-60px)"
      deleteBg.onclick = async () => {
        await sb.from("tasks").delete().eq("id", t.id).eq("user_id", user.id)
        wrapper.remove()
        tasks = tasks.filter(x => x.id !== t.id)
        renderFocus()
        showToast("Task deleted")
      }
    } else {
      card.style.transform = "translateX(0)"
    }
  })

  wrapper.appendChild(deleteBg)
  wrapper.appendChild(card)
  return wrapper
}

// ── EDIT TASK ──

function openEditTask(t) {

async function deleteEditTask() {
  if (!editingTask) return

  closeSheet("editTaskSheet")
  showToast("Task deleted")
  await loadAll()
}

// ── RENAME PROJECT ──

  document.getElementById("renameProjectInput").value = currentProject.title
  const picker = document.getElementById("colorPicker")
  picker.innerHTML = ""
  PROJECT_COLORS.forEach(c => {
    const dot = document.createElement("div")
    dot.className = "color-dot" + (c === selectedColor ? " selected" : "")

    dot.onclick = () => {
      selectedColor = c
      picker.querySelectorAll(".color-dot").forEach(d => d.classList.remove("selected"))
      dot.classList.add("selected")
    }
    picker.appendChild(dot)
  })
  document.getElementById("renameProjectSheet").classList.add("open")
}

async function saveRenameProject() {
  const title = document.getElementById("renameProjectInput").value.trim()
  if (!title || !currentProject) return
  await sb.from("projects").update({ title, color: selectedColor }).eq("id", currentProject.id).eq("user_id", user.id)
  currentProject.title = title
  currentProject.color = selectedColor
  document.getElementById("detailTitle").innerText = title
  closeSheet("renameProjectSheet")
  showToast("Project updated ✓")
  await loadAll()
}

function setTaskFilter(projectId, btn) {
  taskProjectFilter = projectId
  document.querySelectorAll("#taskProjectFilter .filter-tab").forEach(b => b.classList.remove("active"))
  btn.classList.add("active")
  renderAllTasks()
}

// ── ALL TASKS ──
function renderAllTasks() {
  const el = document.getElementById("allTasksList")
  const search = (document.getElementById("taskSearch")?.value || "").toLowerCase().trim()
  const pm = {}; projects.forEach(p => pm[p.id] = p)

  let filtered = tasks
  if (taskProjectFilter) filtered = filtered.filter(t => t.project_id === taskProjectFilter)
  if (search) filtered = filtered.filter(t => t.title.toLowerCase().includes(search) || (t.notes||"").toLowerCase().includes(search))

  if (!filtered.length) { el.innerHTML = `<div class="empty">${search?"No results.":"No tasks yet."}</div>`; return }
  el.innerHTML = ""
  const open = filtered.filter(t => t.status !== "done")
  const done = filtered.filter(t => t.status === "done")
  ;[...open, ...done].forEach(t => {
    el.appendChild(makeTaskCard(t, pm[t.project_id]))
  })
}

// ── INVENTORY ──
function setInvFilter(f, btn) {
  invFilter = f
  document.querySelectorAll(".filter-tab").forEach(b => b.classList.remove("active"))
  btn.classList.add("active")
  renderInventory()
}

function renderInventory() {
  const el = document.getElementById("inventoryList")
  const filtered = invFilter === "all" ? inventory : inventory.filter(i => i.type === invFilter)
  if (!filtered.length) { el.innerHTML = `<div class="empty">No items yet.</div>`; return }
  el.innerHTML = ""
  const statusLabel = { have: "Have it", low: "Running low", missing: "Missing" }
  filtered.forEach(item => {
    const d = document.createElement("div")
    d.className = "inv-card"
    d.innerHTML = `
      <div class="inv-name">${item.name}</div>
      <div class="inv-meta">${item.type}${item.quantity!=null?" · qty: "+item.quantity:""}${item.location?" · "+item.location:""}</div>
      <span class="inv-status ${item.status}">${statusLabel[item.status]||item.status}</span>`
    d.onclick = () => openEditInventory(item)
    el.appendChild(d)
  })
}

function openAddInventory() {
  editingInvItem = null
  document.getElementById("invSheetTitle").innerText = "New item"
  document.getElementById("invSaveBtn").innerText = "Add item"
  document.getElementById("invDeleteBtn").style.display = "none"
  document.getElementById("invName").value = ""
  document.getElementById("invType").value = "part"
  document.getElementById("invStatus").value = "have"
  document.getElementById("invQty").value = ""
  document.getElementById("invLocation").value = ""
  document.getElementById("addInventorySheet").classList.add("open")
  setTimeout(() => document.getElementById("invName").focus(), 300)
}

function openEditInventory(item) {
  editingInvItem = item
  document.getElementById("invSheetTitle").innerText = "Edit item"
  document.getElementById("invSaveBtn").innerText = "Save"
  document.getElementById("invDeleteBtn").style.display = "block"
  document.getElementById("invName").value = item.name
  document.getElementById("invType").value = item.type
  document.getElementById("invStatus").value = item.status
  document.getElementById("invQty").value = item.quantity || ""
  document.getElementById("invLocation").value = item.location || ""
  document.getElementById("addInventorySheet").classList.add("open")

async function saveInventoryItem() {
  const name = document.getElementById("invName").value.trim()
  if (!name) return
  const data = {
    name,
    type: document.getElementById("invType").value,
    status: document.getElementById("invStatus").value,
    quantity: document.getElementById("invQty").value ? parseInt(document.getElementById("invQty").value) : null,
    location: document.getElementById("invLocation").value.trim() || null,
  }
  if (editingInvItem) {
    await sb.from("inventory").update(data).eq("id", editingInvItem.id).eq("user_id", user.id)
    showToast("Item updated ✓")
  } else {
    await sb.from("inventory").insert({ ...data, user_id: user.id })
    showToast("Item added ✓")
  }
  closeSheet("addInventorySheet")
  await loadAll()
}

async function deleteCurrentInvItem() {
  if (!editingInvItem) return
  await sb.from("inventory").delete().eq("id", editingInvItem.id).eq("user_id", user.id)
  closeSheet("addInventorySheet")
  showToast("Item deleted")
  await loadAll()
}

// ── FOCUS ──
function renderFocus() {
  const el = document.getElementById("focusContent")
  const open = tasks.filter(t => t.status !== "done" && !t.blocked_reason)
  if (!open.length) {
    el.innerHTML = `<div class="empty">${projects.length ? "All done or blocked." : "Add projects and tasks to see your focus."}</div>`
    return
  }
  const pm = {}; projects.forEach(p => pm[p.id] = p)
  el.innerHTML = `<div class="focus-count">${open.length} task${open.length!==1?"s":""} available</div>`
  open.forEach(t => {
    const proj = pm[t.project_id]
    const d = document.createElement("div")
    d.className = "focus-card"
    d.innerHTML = `
      ${proj?`<div class="focus-project">${proj.title}${t.category?` <span class="focus-category">· ${t.category}</span>`:""}</div>`:""}
      <div class="focus-title">${t.title}</div>
      ${t.notes?`<div class="focus-notes">${t.notes}</div>`:""}
      <div class="focus-actions">
        <button onclick="completeTask('${t.id}')">Complete</button>
        <button class="btn-skip" onclick="this.closest('.focus-card').remove()">Skip</button>
      </div>`
    el.appendChild(d)
  })
}

// ── UI ──
function showTab(tab) {
  ["focus","tasks","projects","inventory","settings"].forEach(t => {
    document.getElementById(t+"Tab").style.display = t===tab?"block":"none"
    document.getElementById("tab-"+t).classList.toggle("active", t===tab)
  })
}

function closeSheet(id) { document.getElementById(id).classList.remove("open") }
function closeIfBg(e, id) { if (e.target===document.getElementById(id)) closeSheet(id) }

let pendingDelete = null
function confirmDelete() {
  pendingDelete = () => deleteProject(currentProject.id)
  document.getElementById("confirmTitle").innerText = "Delete project?"
  document.getElementById("confirmText").innerText = `"${currentProject.title}" and all its tasks will be deleted.`
  document.getElementById("confirmOk").onclick = () => { closeConfirm(); pendingDelete() }
  document.getElementById("confirmOverlay").classList.add("open")
}
function closeConfirm() { document.getElementById("confirmOverlay").classList.remove("open") }

let feedbackType = null
function openFeedback(type) {
  feedbackType = type
  document.getElementById("feedbackSheetTitle").innerText = type === "bug" ? "Report a problem" : "Share an idea"
  document.getElementById("feedbackText").value = ""
  document.getElementById("feedbackText").placeholder = type === "bug" ? "Describe the problem..." : "Describe your idea..."
  document.getElementById("feedbackSheet").classList.add("open")
  setTimeout(() => document.getElementById("feedbackText").focus(), 300)
}
async function submitFeedback() {
  const text = document.getElementById("feedbackText").value.trim()
  if (!text) return
  await sb.from("feedback").insert({ user_id: user?.id || null, type: feedbackType, text })
  closeSheet("feedbackSheet")
  showToast("Thanks for the feedback!")
}

if ("serviceWorker" in navigator) navigator.serviceWorker.register("sw.js")

// Only block pinch zoom, don't interfere with scroll
document.addEventListener("touchmove", e => {
  if (e.touches.length > 1) e.preventDefault()
}, { passive: false })
</script>
