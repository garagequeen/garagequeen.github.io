<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Garage Tasks</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>

body{
font-family:Arial;
margin:20px;
background:#f4f4f4;
}

h1{
margin-bottom:20px;
}

#task-list{
display:flex;
flex-direction:column;
gap:12px;
}

.task{
background:white;
padding:12px;
border-radius:8px;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

.task-title{
font-weight:bold;
margin-bottom:6px;
}

.task-photos{
display:flex;
gap:6px;
flex-wrap:wrap;
margin-top:6px;
}

.task-photo{
width:80px;
height:80px;
object-fit:cover;
border-radius:6px;
}

button{
margin-top:6px;
}

</style>
</head>

<body>

<h1>Garage Tasks</h1>

<input id="task-input" placeholder="New task">
<button onclick="addTask()">Add</button>

<hr>

<div id="task-list"></div>

<script>

const SUPA_URL = "https://fqmmlntmpybijmvrsfxx.supabase.co"
const SUPA_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZxbW1sbnRtcHliaWptdnJzZnh4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI4MTYyMzMsImV4cCI6MjA4ODM5MjIzM30.HeiCco9pyNwDKUJJhA5Af6Yh7AIRZH5GGlvr4BFOcXk"

const { createClient } = supabase

const supabaseClient = createClient(
SUPA_URL,
SUPA_KEY
)
async function loadTasks(){

const { data, error } = await supabaseClient
.from("tasks")
.select(`
id,
title,
done,
photo,
photos (
id,
url
)
`)
.order("created_at",{ascending:false})

if(error){
console.error(error)
return
}

renderTasks(data)

}

function renderTasks(tasks){

const list = document.getElementById("task-list")
list.innerHTML=""

tasks.forEach(task=>{

let photosHtml=""

if(task.photos){

photosHtml += task.photos
.map(p=>`<img src="${p.url}" class="task-photo">`)
.join("")

}

if(task.photo){
photosHtml += `<img src="${task.photo}" class="task-photo">`
}

const el=document.createElement("div")
el.className="task"

el.innerHTML=`

<div class="task-title">
${task.title}
</div>

<div class="task-photos">
${photosHtml}
</div>

<input type="file" onchange="uploadPhoto('${task.id}',this)">

<br>

<button onclick="completeTask('${task.id}')">
Complete
</button>

<button onclick="deleteTask('${task.id}')">
Delete
</button>

`

list.appendChild(el)

})

}

async function addTask(){

const input=document.getElementById("task-input")

const title=input.value.trim()

if(!title) return

const { error } = await supabaseClient
.from("tasks")
.insert({
title:title,
done:false
})

if(error){
console.error(error)
return
}

input.value=""

loadTasks()

}

async function completeTask(id){

const { error } = await supabaseClient
.from("tasks")
.update({done:true})
.eq("id",id)

if(error){
console.error(error)
return
}

loadTasks()

}

async function deleteTask(id){

const { error } = await supabaseClient
.from("tasks")
.delete()
.eq("id",id)

if(error){
console.error(error)
return
}

loadTasks()

}

async function uploadPhoto(taskId,input){

const file=input.files[0]

if(!file) return

const filePath=`${taskId}/${Date.now()}_${file.name}`

const { error:uploadError } = await supabase.storage
.from("taskphotos")
.upload(filePath,file)

if(uploadError){
console.error(uploadError)
return
}

const { data } = supabase.storage
.from("taskphotos")
.getPublicUrl(filePath)

const url=data.publicUrl

const { error } = await supabaseClient
.from("photos")
.insert({
task_id:taskId,
url:url
})

if(error){
console.error(error)
return
}

loadTasks()

}

loadTasks()

</script>

</body>
</html>
