<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>GarageQueen</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

body{
font-family:Arial;
margin:0;
background:#f4f4f4;
}

header{
background:#111;
color:white;
padding:12px;
font-size:18px;
}

.container{
padding:16px;
max-width:600px;
margin:auto;
}

input{
padding:8px;
margin:4px 0;
width:100%;
box-sizing:border-box;
}

button{
padding:8px 12px;
margin-top:6px;
cursor:pointer;
}

.task{
background:white;
padding:12px;
border-radius:8px;
margin-top:12px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

.task-title{
font-weight:bold;
}

.task-photos{
display:flex;
gap:6px;
flex-wrap:wrap;
margin-top:6px;
}

.task-photo{
width:80px;
height:80px;
object-fit:cover;
border-radius:6px;
}

#app{
display:none;
}

</style>
</head>

<body>

<header>GarageQueen</header>

<div class="container">

<div id="login">

<h3>Login</h3>

<input id="email" placeholder="email">
<input id="password" type="password" placeholder="password">

<button onclick="login()">Login</button>
<button onclick="signup()">Signup</button>

</div>

<div id="app">

<h3>Tasks</h3>

<input id="task-input" placeholder="New task">
<button onclick="addTask()">Add Task</button>

<div id="task-list"></div>

</div>

</div>

<script>

const SUPA_URL = "https://fqmmlntmpybijmvrsfxx.supabase.co"
const SUPA_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZxbW1sbnRtcHliaWptdnJzZnh4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI4MTYyMzMsImV4cCI6MjA4ODM5MjIzM30.HeiCco9pyNwDKUJJhA5Af6Yh7AIRZH5GGlvr4BFOcXk"

const { createClient } = supabase
const supabaseClient=createClient(SUPABASE_URL,SUPABASE_KEY)


async function login(){

const email=document.getElementById("email").value
const password=document.getElementById("password").value

const { error } = await supabaseClient.auth.signInWithPassword({
email,
password
})

if(error){
alert(error.message)
return
}

startApp()

}


async function signup(){

const email=document.getElementById("email").value
const password=document.getElementById("password").value

const { error } = await supabaseClient.auth.signUp({
email,
password
})

if(error){
alert(error.message)
}

}


function startApp(){

document.getElementById("login").style.display="none"
document.getElementById("app").style.display="block"

loadTasks()

}


async function checkSession(){

const { data } = await supabaseClient.auth.getSession()

if(data.session){
startApp()
}

}

checkSession()



async function loadTasks(){

const { data, error } = await supabaseClient
.from("tasks")
.select(`
id,
title,
done,
photo,
photos (
id,
url
)
`)
.order("created_at",{ascending:false})

if(error){
console.error(error)
return
}

renderTasks(data)

}



function renderTasks(tasks){

const list=document.getElementById("task-list")
list.innerHTML=""

tasks.forEach(task=>{

let photosHtml=""

if(task.photos){
photosHtml += task.photos
.map(p=>`<img src="${p.url}" class="task-photo">`)
.join("")
}

if(task.photo){
photosHtml += `<img src="${task.photo}" class="task-photo">`
}

const el=document.createElement("div")
el.className="task"

el.innerHTML=`

<div class="task-title">${task.title}</div>

<div class="task-photos">
${photosHtml}
</div>

<input type="file" onchange="uploadPhoto('${task.id}',this)">

<br>

<button onclick="completeTask('${task.id}')">
Complete
</button>

<button onclick="deleteTask('${task.id}')">
Delete
</button>

`

list.appendChild(el)

})

}



async function addTask(){

const input=document.getElementById("task-input")
const title=input.value.trim()

if(!title) return

const user = await supabaseClient.auth.getUser()

const { error } = await supabaseClient
.from("tasks")
.insert({
title:title,
done:false,
user_id:user.data.user.id
})

if(error){
console.error(error)
return
}

input.value=""

loadTasks()

}



async function completeTask(id){

const { error } = await supabaseClient
.from("tasks")
.update({done:true})
.eq("id",id)

if(error){
console.error(error)
return
}

loadTasks()

}



async function deleteTask(id){

const { error } = await supabaseClient
.from("tasks")
.delete()
.eq("id",id)

if(error){
console.error(error)
return
}

loadTasks()

}



async function uploadPhoto(taskId,input){

const file=input.files[0]
if(!file) return

const filePath=`${taskId}/${Date.now()}_${file.name}`

const { error:uploadError } = await supabaseClient.storage
.from("taskphotos")
.upload(filePath,file)

if(uploadError){
console.error(uploadError)
return
}

const { data } = supabaseClient.storage
.from("taskphotos")
.getPublicUrl(filePath)

const url=data.publicUrl

const { error } = await supabaseClient
.from("photos")
.insert({
task_id:taskId,
url:url
})

if(error){
console.error(error)
return
}

loadTasks()

}

</script>

</body>
</html>
