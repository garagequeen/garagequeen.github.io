<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">

<title>Focus Tasks</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

body{
margin:0;
font-family: system-ui;
color:white;
background:black;
padding-bottom:80px;
}

.container{
padding:20px;
}

input{
width:100%;
padding:14px;
border-radius:10px;
border:none;
font-size:16px;
margin-bottom:10px;
}

button{
padding:12px;
border:none;
border-radius:10px;
font-size:16px;
}

.add-btn{
width:100%;
background:#2ecc71;
color:white;
}

.add-btn:disabled{
opacity:0.5;
}

.task{
display:flex;
justify-content:space-between;
align-items:center;
padding:10px;
margin-top:10px;
background:rgba(255,255,255,0.1);
border-radius:10px;
}

.bottom-nav{
position:fixed;
bottom:0;
left:0;
width:100%;
display:flex;
justify-content:space-around;
background:rgba(0,0,0,0.7);
padding:12px;
backdrop-filter:blur(10px);
}

.bottom-nav button{
background:none;
border:none;
color:white;
font-size:14px;
}

</style>

</head>
<body>

<div class="container" id="focusScreen">

<h2 id="title"></h2>

<input id="taskInput">

<button id="addTaskBtn" class="add-btn" disabled></button>

<div id="tasks"></div>

</div>

<div class="container" id="projectsScreen" style="display:none">
<h2>Projects</h2>
</div>

<div class="container" id="tasksScreen" style="display:none">
<h2>All Tasks</h2>
</div>

<div class="container" id="inventoryScreen" style="display:none">
<h2>Inventory</h2>
</div>

<div class="container" id="settingsScreen" style="display:none">

<h2 id="settingsTitle"></h2>

<button id="logoutBtn"></button>

</div>

<div class="bottom-nav">

<button id="navFocus"></button>
<button id="navProjects"></button>
<button id="navTasks"></button>
<button id="navInventory"></button>
<button id="navSettings"></button>

</div>

<script>

const SUPA_URL = "https://fqmmlntmpybijmvrsfxx.supabase.co"
const SUPA_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZxbW1sbnRtcHliaWptdnJzZnh4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI4MTYyMzMsImV4cCI6MjA4ODM5MjIzM30.HeiCco9pyNwDKUJJhA5Af6Yh7AIRZH5GGlvr4BFOcXk"

const supabase = supabase.createClient(SUPA_URL,SUPA_KEY)

const translations = {

en:{
title:"Focus",
projects:"Projects",
tasks:"Tasks",
inventory:"Inventory",
settings:"Settings",
addTask:"Add task",
writeTask:"Write a task...",
logout:"Logout"
},

uk:{
title:"Фокус",
projects:"Проєкти",
tasks:"Задачі",
inventory:"Інвентар",
settings:"Налаштування",
addTask:"Додати задачу",
writeTask:"Напиши задачу...",
logout:"Вийти"
}

}

let lang = localStorage.getItem("lang")

if(!lang){
lang = navigator.language.startsWith("uk") ? "uk" : "en"
}

const t = translations[lang]

title.innerText = t.title
settingsTitle.innerText = t.settings

navFocus.innerText = t.title
navProjects.innerText = t.projects
navTasks.innerText = t.tasks
navInventory.innerText = t.inventory
navSettings.innerText = t.settings

taskInput.placeholder = t.writeTask
addTaskBtn.innerText = t.addTask
logoutBtn.innerText = t.logout

taskInput.addEventListener("input",()=>{

addTaskBtn.disabled =
taskInput.value.trim()===""

})

async function loadTasks(){

const {data} = await supabase
.from("tasks")
.select("*")
.order("created_at",{ascending:false})

tasks.innerHTML=""

data.forEach(task=>{

const div=document.createElement("div")

div.className="task"

div.innerHTML=`
<span>${task.title}</span>
<input type="checkbox" ${task.done ? "checked":""}>
`

tasks.appendChild(div)

})

}

addTaskBtn.onclick = async ()=>{

const text = taskInput.value.trim()

if(!text) return

await supabase
.from("tasks")
.insert([{title:text}])

taskInput.value=""
addTaskBtn.disabled=true

loadTasks()

}

logoutBtn.onclick = async ()=>{

await supabase.auth.signOut()

location.reload()

}

function showScreen(screen){

focusScreen.style.display="none"
projectsScreen.style.display="none"
tasksScreen.style.display="none"
inventoryScreen.style.display="none"
settingsScreen.style.display="none"

screen.style.display="block"

}

navFocus.onclick=()=>showScreen(focusScreen)
navProjects.onclick=()=>showScreen(projectsScreen)
navTasks.onclick=()=>showScreen(tasksScreen)
navInventory.onclick=()=>showScreen(inventoryScreen)
navSettings.onclick=()=>showScreen(settingsScreen)

loadTasks()

</script>

</body>
</html>
