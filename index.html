async function loadTasks(){

.from("tasks")

function renderTasks(){

const el = document.getElementById("tasks")

el.innerHTML=""

tasks.forEach(t=>{

card.className="card"

card.innerHTML = `

<p>Status: ${t.done ? "Done" : "Open"}</p>

${t.photo ? `<img class="taskphoto" src="${t.photo}">` : ""}
`

el.appendChild(card)

})

}

function renderGallery(){

g.innerHTML=""

tasks
.filter(t=>t.photo)
.forEach(t=>{

})

}
