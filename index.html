</style>

<script>
const SUPA_URL = "https://fqmmlntmpybijmvrsfxx.supabase.co";
const SUPA_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZxbW1sbnRtcHliaWptdnJzZnh4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI4MTYyMzMsImV4cCI6MjA4ODM5MjIzM30.HeiCco9pyNwDKUJJhA5Af6Yh7AIRZH5GGlvr4BFOcXk";
const sb = window.supabase.createClient(SUPA_URL, SUPA_KEY);

let user = null;
let objs = [], tasks = [], taskIdx = 0;

// ── AUTH ──────────────────────────────────────────────────────────
async function googleLogin() {
  await sb.auth.signInWithOAuth({
    provider: 'google',
    options: { redirectTo: window.location.href }
  });
}

async function doLogout() {
  await sb.auth.signOut();
  location.reload();
}

function showApp() {
  document.getElementById('loading').style.display = 'none';
  document.getElementById('login').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  document.getElementById('userInfo').textContent = user.email;
}

sb.auth.onAuthStateChange(async (event, session) => {
  if (session && session.user) {
    user = session.user;
    showApp();
    await loadData();
  }
});

(async () => {
  const { data } = await sb.auth.getSession();
  if (!data.session) {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('login').style.display = 'flex';
  }
})();

setTimeout(() => {
  if (document.getElementById('loading').style.display !== 'none') {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('login').style.display = 'flex';
  }
}, 7000);

// ── DATA ──────────────────────────────────────────────────────────
async function loadData() {
  try {
    const [res1, res2] = await Promise.all([
      sb.from('objects').select('*').eq('user_id', user.id).order('created_at'),
      sb.from('tasks').select('*').eq('user_id', user.id).order('created_at')
    ]);
    objs = res1.data || [];
    tasks = res2.data || [];
  } catch(e) {
    objs = []; tasks = [];
  }
  taskIdx = 0;
  renderTask();
  renderProjects();
  renderBuy();
  renderAll();
}

// ── TASK CARD ─────────────────────────────────────────────────────
function getTodo() {
  const p = { H: 0, M: 1, L: 2 };
  return tasks.filter(t => t.status !== 'done').sort((a, b) => (p[a.priority] ?? 9) - (p[b.priority] ?? 9));
}

function renderTask() {
  const todo = getTodo();
  if (!todo.length) {
    document.getElementById('taskTitle').textContent = 'All done! 🎉';
    document.getElementById('taskMeta').textContent = '';
    document.getElementById('taskObj').textContent = '';
    document.getElementById('taskTags').innerHTML = '';
    document.getElementById('taskNote').textContent = '';
    document.getElementById('progress').style.width = '100%';
    return;
  }
  if (taskIdx >= todo.length) taskIdx = 0;
  const t = todo[taskIdx];
  const obj = objs.find(o => o.id === t.object_id);
  const pLabel = t.priority === 'H' ? 'urgent' : t.priority === 'M' ? 'normal' : 'low';
  document.getElementById('taskMeta').textContent = (taskIdx + 1) + ' / ' + todo.length;
  document.getElementById('taskTitle').textContent = t.title;
  document.getElementById('taskObj').textContent = obj ? obj.name : '';
  document.getElementById('taskTags').innerHTML =
    '<span class="tag">' + pLabel + '</span>' +
    (t.category ? '<span class="tag">' + t.category + '</span>' : '') +
    (t.youtube ? '<span class="tag">▶ YT</span>' : '');
  document.getElementById('taskNote').textContent = t.notes ? '→ ' + t.notes : '';
  if (obj) {
    const objT = tasks.filter(x => x.object_id === obj.id);
    const done = objT.filter(x => x.status === 'done').length;
    const pct = objT.length ? Math.round(done / objT.length * 100) : 0;
    document.getElementById('progress').style.width = pct + '%';
  }
}

async function doneTask() {
  const todo = getTodo();
  if (!todo.length) return;
  const t = todo[taskIdx];
  await sb.from('tasks').update({ status: 'done', done_at: new Date().toISOString() }).eq('id', t.id);
  t.status = 'done'; t.priority = '';
  taskIdx = 0;
  renderTask(); renderProjects(); renderAll();
}

function skipTask() {
  const todo = getTodo();
  if (!todo.length) return;
  taskIdx = (taskIdx + 1) % todo.length;
  renderTask();
}

// ── FLEET ─────────────────────────────────────────────────────────
function renderProjects() {
  const el = document.getElementById('projects');
  if (!objs.length) {
    el.innerHTML = '<p style="opacity:0.4;font-size:14px">No projects yet. Tap + to add one.</p>';
    return;
  }
  el.innerHTML = objs.map(obj => {
    const ot = tasks.filter(t => t.object_id === obj.id);
    const done = ot.filter(t => t.status === 'done').length;
    const pct = ot.length ? Math.round(done / ot.length * 100) : 0;
    const urgent = ot.filter(t => t.status !== 'done' && t.priority === 'H').length;
    return '<div class="card" style="width:90%;margin-bottom:10px">' +
      '<h2>' + obj.name + '</h2>' +
      '<p style="font-size:13px;opacity:0.6">' + (ot.length - done) + ' tasks left' + (urgent ? ' · ' + urgent + ' urgent' : '') + '</p>' +
      '<div class="progress-container"><div class="progress-bar" style="width:' + pct + '%"></div></div>' +
      '</div>';
  }).join('');
}

// ── BUY LIST ──────────────────────────────────────────────────────
function renderBuy() {
  const items = tasks.filter(t => t.status !== 'done' && t.notes);
  const p = { H: 0, M: 1, L: 2 };
  items.sort((a, b) => (p[a.priority] ?? 9) - (p[b.priority] ?? 9));
  document.getElementById('buyList').innerHTML = items.length
    ? items.map(t => {
        const obj = objs.find(o => o.id === t.object_id);
        return '<p style="padding:8px 0;border-bottom:1px solid rgba(255,255,255,.08);font-size:14px">' +
          '→ ' + t.notes + '<br><span style="opacity:0.4;font-size:11px">' + (obj ? obj.name : '') + ' · ' + t.title + '</span></p>';
      }).join('')
    : '<p style="opacity:0.4">Nothing to buy</p>';
}

// ── ALL TASKS ─────────────────────────────────────────────────────
function renderAll() {
  const p = { H: 0, M: 1, L: 2 };
  const sorted = [...tasks].sort((a, b) => (p[a.priority] ?? 9) - (p[b.priority] ?? 9));
  document.getElementById('allTasks').innerHTML = sorted.length
    ? sorted.map(t => {
        const obj = objs.find(o => o.id === t.object_id);
        const done = t.status === 'done';
        return '<p style="padding:8px 0;border-bottom:1px solid rgba(255,255,255,.08);font-size:14px;' + (done ? 'opacity:0.3;text-decoration:line-through' : '') + '">' +
          t.title + '<br><span style="opacity:0.4;font-size:11px">' + (obj ? obj.name : '') + (t.category ? ' · ' + t.category : '') + '</span></p>';
      }).join('')
    : '<p style="opacity:0.4">No tasks yet</p>';
}

// ── TABS ──────────────────────────────────────────────────────────
const tabIds = ['tasks', 'projects', 'budget', 'tools', 'settings'];

function showTab(tab) {
  tabIds.forEach(t => {
    document.getElementById(t).classList.add('hidden');
    document.getElementById('btn-' + t).classList.remove('active');
  });
  document.getElementById(tab).classList.remove('hidden');
  document.getElementById('btn-' + tab).classList.add('active');
  const fab = document.getElementById('fab');
  const smartBtn = document.getElementById('smartBtn');
  const hint = document.getElementById('smartHint');
  fab.style.display = ['tasks','projects','budget'].includes(tab) ? 'flex' : 'none';
  smartBtn.style.display = ['tasks','projects','budget','tools'].includes(tab) ? 'flex' : 'none';
  if (tab === 'tasks') hint.textContent = 'paste or import tasks';
  else if (tab === 'projects') hint.textContent = 'paste or import projects';
  else if (tab === 'budget') hint.textContent = 'paste buy list';
  else hint.textContent = 'paste or import';
}

function openFab() {
  const tab = tabIds.find(t => !document.getElementById(t).classList.contains('hidden'));
  if (tab === 'tasks') openModal('m-task');
  else if (tab === 'projects') openModal('m-project');
  else if (tab === 'budget') openModal('m-buy');
}

// ── MODALS ────────────────────────────────────────────────────────
function openModal(id) {
  ['t-obj','b-obj'].forEach(sel => {
    const el = document.getElementById(sel);
    if (!el) return;
    el.innerHTML = '<option value="">— project —</option>' +
      objs.map(o => '<option value="' + o.id + '">' + o.name + '</option>').join('');
  });
  if (id === 'smart') {
    document.getElementById('smart-preview').textContent = '';
    document.getElementById('smart-text').value = '';
    document.getElementById('csvFile').value = '';
    document.getElementById('m-smart').classList.add('open');
    return;
  }
  document.getElementById(id).classList.add('open');
}

function closeModal(id) {
  document.getElementById(id).classList.remove('open');
}

document.querySelectorAll('.modal-bg').forEach(bg => {
  bg.addEventListener('click', e => { if (e.target === bg) bg.classList.remove('open'); });
});

// ── PRIORITY SELECTORS ────────────────────────────────────────────
let curP = 'H', curPB = 'H';

function selP(btn) {
  document.querySelectorAll('#m-task .prio-btn').forEach(b => b.className = 'prio-btn');
  btn.className = 'prio-btn on-' + btn.dataset.p;
  curP = btn.dataset.p;
}

function selPB(btn) {
  document.querySelectorAll('#m-buy .prio-btn').forEach(b => b.className = 'prio-btn');
  btn.className = 'prio-btn on-' + btn.dataset.p;
  curPB = btn.dataset.p;
}

// ── SAVE TASK ─────────────────────────────────────────────────────
async function saveTask() {
  const title = document.getElementById('t-title').value.trim();
  if (!title) { toast('Enter task title'); return; }
  const objId = document.getElementById('t-obj').value;
  const note = document.getElementById('t-note').value.trim();
  const cat = document.getElementById('t-cat').value.trim();
  const yt = document.getElementById('t-yt').classList.contains('on');
  const { data, error } = await sb.from('tasks').insert({
    user_id: user.id, object_id: objId || null,
    title, category: cat || null, notes: note || null,
    priority: curP, status: 'active', youtube: yt
  }).select();
  if (error) { toast('Error: ' + error.message); return; }
  if (data && data[0]) tasks.push(data[0]);
  closeModal('m-task');
  ['t-title','t-cat','t-note'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('t-yt').classList.remove('on');
  curP = 'H';
  document.querySelectorAll('#m-task .prio-btn').forEach((b,i) => b.className = 'prio-btn' + (i===0?' on-H':''));
  taskIdx = 0;
  renderTask(); renderAll(); renderBuy();
  toast('Task added ✓');
}

// ── SMART IMPORT ──────────────────────────────────────────────────
function parseSmartText(text) {
  const lines = text.split('\n').map(l => l.trim()).filter(l => l);
  const result = [];
  let currentProject = null;
  const priceRx = /(\d[\d\s]*(?:uah|грн|eur|€|\$|usd))/i;
  const urgentRx = /\b(urgent|срочно|терміново|high|важно|важливо)\b/i;
  const lowRx = /\b(later|потом|пізніше|low|можно потом)\b/i;
  const taskMarkers = /^[-•*–]\s*/;
  lines.forEach(line => {
    if (taskMarkers.test(line)) {
      const title = line.replace(taskMarkers, '').trim();
      const priceMatch = title.match(priceRx);
      const note = priceMatch ? priceMatch[0] : null;
      const cleanTitle = note ? title.replace(priceMatch[0], '').replace(/,\s*$/, '').trim() : title;
      const priority = urgentRx.test(title) ? 'H' : lowRx.test(title) ? 'L' : 'M';
      if (!currentProject) currentProject = { project: null, tasks: [] };
      currentProject.tasks.push({ title: cleanTitle, note, priority });
    } else {
      if (currentProject) result.push(currentProject);
      currentProject = { project: line, tasks: [] };
    }
  });
  if (currentProject) result.push(currentProject);
  return result;
}

function parseCSV(text) {
  const lines = text.split('\n').filter(l => l.trim());
  if (!lines.length) return [];
  const headers = lines[0].split(',').map(h => h.trim().toLowerCase());
  const result = [], projectMap = {};
  for (let i = 1; i < lines.length; i++) {
    const cols = lines[i].split(',').map(c => c.trim().replace(/^"|"$/g, ''));
    const row = {};
    headers.forEach((h, idx) => row[h] = cols[idx] || '');
    const proj = row['project'] || row['object'] || row['car'] || row['объект'] || '';
    const title = row['task'] || row['title'] || row['задача'] || cols[0] || '';
    const note = row['note'] || row['buy'] || row['notes'] || row['купить'] || '';
    const priority = (row['priority'] || row['приоритет'] || 'M').toUpperCase()[0];
    if (!title) continue;
    if (!projectMap[proj]) { projectMap[proj] = { project: proj, tasks: [] }; result.push(projectMap[proj]); }
    projectMap[proj].tasks.push({ title, note, priority: ['H','M','L'].includes(priority) ? priority : 'M' });
  }
  return result;
}

let csvParsed = null;

document.getElementById('smart-text').addEventListener('input', function() {
  csvParsed = null;
  showPreview(parseSmartText(this.value));
});

document.getElementById('csvFile').addEventListener('change', function() {
  const reader = new FileReader();
  reader.onload = e => {
    csvParsed = parseCSV(e.target.result);
    showPreview(csvParsed);
    document.getElementById('smart-text').value = '';
  };
  reader.readAsText(this.files[0]);
});

function showPreview(parsed) {
  const el = document.getElementById('smart-preview');
  if (!parsed.length) { el.textContent = ''; return; }
  el.innerHTML = parsed.map(p => '<b>' + (p.project || '(no project)') + '</b>: ' + p.tasks.length + ' tasks').join('<br>');
}

async function runSmartImport() {
  let parsed = csvParsed;
  if (!parsed) {
    const text = document.getElementById('smart-text').value.trim();
    if (!text) { toast('Paste text or load CSV first'); return; }
    parsed = parseSmartText(text);
  }
  if (!parsed.length) { toast('Nothing to import'); return; }
  let taskCount = 0;
  for (const group of parsed) {
    let obj = objs.find(o => o.name.toLowerCase() === (group.project||'').toLowerCase());
    if (!obj && group.project) {
      const { data } = await sb.from('objects').insert({
        user_id: user.id, name: group.project, type: 'other', status: 'active'
      }).select();
      if (data && data[0]) { obj = data[0]; objs.push(obj); }
    }
    for (const t of group.tasks) {
      const { data } = await sb.from('tasks').insert({
        user_id: user.id, object_id: obj ? obj.id : null,
        title: t.title, notes: t.note || null,
        priority: t.priority, status: 'active'
      }).select();
      if (data && data[0]) { tasks.push(data[0]); taskCount++; }
    }
  }
  csvParsed = null;
  closeModal('m-smart');
  taskIdx = 0;
  renderTask(); renderProjects(); renderBuy(); renderAll();
  toast('Imported ' + taskCount + ' tasks ✓');
}

document.getElementById('bgUpload').addEventListener('change', function () {

});

function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2500);
}
