<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">

<title>Garage Log</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#111111">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
}

body{
background:#111;
color:white;
height:100vh;
overflow:hidden;
}

#bg{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
z-index:-2;
}

#overlay{
position:fixed;
inset:0;
background:rgba(0,0,0,0.55);
z-index:-1;
}

#login{
position:fixed;
inset:0;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
gap:20px;
background:#111;
}

button{
padding:10px 16px;
border:none;
border-radius:10px;
background:#3fb950;
color:white;
font-size:14px;
cursor:pointer;
margin-top:8px;
}

.container{
padding:20px;
height:100vh;
overflow:auto;
padding-bottom:80px;
}

.card{
background:rgba(30,30,30,0.85);
border-radius:16px;
padding:16px;
margin-bottom:14px;
}

input{
width:100%;
margin-top:10px;
padding:10px;
border-radius:8px;
border:none;
background:#222;
color:white;
}

img.taskphoto{
width:100%;
border-radius:10px;
margin-top:10px;
}

.gallery img{
width:100%;
border-radius:12px;
margin-bottom:12px;
}

.tabs{
position:fixed;
bottom:0;
left:0;
width:100%;
display:flex;
background:#000;
border-top:1px solid #222;
}

.tabs button{
flex:1;
background:none;
padding:14px;
font-size:14px;
color:white;
}

</style>

</head>

<body>

<img id="bg">
<div id="overlay"></div>

<div id="login">
<h2 id="loginTitle">Garage Log</h2>
<button onclick="login()" id="loginBtn"></button>
</div>

<div id="app" style="display:none">

<div id="tasksTab" class="container">

<h2 id="tasksTitle"></h2>

<div class="card">

<input id="newTask">

<button id="addTaskBtn" onclick="addTask()" disabled></button>

</div>

<div id="tasks"></div>

</div>

<div id="galleryTab" class="container" style="display:none">

<h2 id="galleryTitle"></h2>

<div id="gallery" class="gallery"></div>

</div>

<div id="settingsTab" class="container" style="display:none">

<div class="card">

<h3>Background</h3>

<input type="file" id="bgUpload" accept="image/*">

</div>

<div class="card">

<button onclick="logout()" id="logoutBtn"></button>

</div>

</div>

<div class="tabs">

<button onclick="showTab('tasks')" id="tabTasks"></button>
<button onclick="showTab('gallery')" id="tabGallery"></button>
<button onclick="showTab('settings')" id="tabSettings"></button>

</div>

</div>

<script>

const SUPA_URL = "https://fqmmlntmpybijmvrsfxx.supabase.co"
const SUPA_KEY = "YOUR_ANON_KEY"

const sb = supabase.createClient(SUPA_URL, SUPA_KEY)

const translations = {

en:{
login:"Sign in with Google",
tasks:"Tasks",
gallery:"Gallery",
settings:"Settings",
newTask:"New task",
addTask:"Add task",
logout:"Logout"
},

uk:{
login:"Увійти через Google",
tasks:"Задачі",
gallery:"Галерея",
settings:"Налаштування",
newTask:"Нова задача",
addTask:"Додати",
logout:"Вийти"
}

}

let lang = navigator.language.startsWith("uk")
? "uk"
: "en"

const t = translations[lang]

loginBtn.innerText = t.login
tasksTitle.innerText = t.tasks
galleryTitle.innerText = t.gallery
tabTasks.innerText = t.tasks
tabGallery.innerText = t.gallery
tabSettings.innerText = t.settings
logoutBtn.innerText = t.logout
addTaskBtn.innerText = t.addTask
document.getElementById("newTask").placeholder = t.newTask

let tasks = []
let user = null

const taskInput = document.getElementById("newTask")
const addBtn = document.getElementById("addTaskBtn")

taskInput.addEventListener("input",()=>{

addBtn.disabled =
taskInput.value.trim()===""

})

function login(){

sb.auth.signInWithOAuth({
provider:"google",
options:{redirectTo:window.location.origin}
})

}

async function logout(){

await sb.auth.signOut()
location.reload()

}

async function checkUser(){

const {data} = await sb.auth.getSession()

if(data.session){

user = data.session.user

document.getElementById("login").style.display="none"
document.getElementById("app").style.display="block"

loadTasks()

}

}

checkUser()

async function loadTasks(){

const {data} = await sb
.from("tasks")
.select("*")
.order("created_at",{ascending:false})

tasks = data || []

renderTasks()
renderGallery()

}

function renderTasks(){

const el = document.getElementById("tasks")

el.innerHTML=""

tasks.forEach(t=>{

const card = document.createElement("div")

card.className="card"

let photoButton=""

if(t.done){

photoButton=`
<input type="file" onchange="uploadPhoto(event,'${t.id}')">
`

}

card.innerHTML = `
<h3>${t.title}</h3>
<p>Status: ${t.done ? "Done" : "Open"}</p>

${!t.done ? `<button onclick="completeTask('${t.id}')">Complete</button>` : ""}

${photoButton}

${t.photo ? `<img class="taskphoto" src="${t.photo}">` : ""}
`

el.appendChild(card)

})

}

function renderGallery(){

const g = document.getElementById("gallery")

g.innerHTML=""

tasks
.filter(t=>t.photo)
.forEach(t=>{

const img = document.createElement("img")

img.src = t.photo

g.appendChild(img)

})

}

async function addTask(){

const title = document.getElementById("newTask").value

if(!title) return

await sb.from("tasks").insert({title:title})

document.getElementById("newTask").value=""

addBtn.disabled = true

loadTasks()

}

async function completeTask(id){

await sb
.from("tasks")
.update({done:true})
.eq("id",id)

loadTasks()

}

function compressImage(file){

return new Promise(resolve=>{

const img = new Image()
const reader = new FileReader()

reader.onload = e => img.src = e.target.result

img.onload = ()=>{

const canvas = document.createElement("canvas")

const MAX = 1600

let w = img.width
let h = img.height

if(w > MAX){
h *= MAX / w
w = MAX
}

canvas.width = w
canvas.height = h

const ctx = canvas.getContext("2d")

ctx.drawImage(img,0,0,w,h)

canvas.toBlob(resolve,"image/jpeg",0.8)

}

reader.readAsDataURL(file)

})

}

async function uploadPhoto(e,id){

let file = e.target.files[0]

if(!file) return

file = await compressImage(file)

const name = id + "-" + Date.now() + ".jpg"

await sb.storage
.from("taskphotos")
.upload(name,file)

const {data} = sb.storage
.from("taskphotos")
.getPublicUrl(name)

await sb
.from("tasks")
.update({photo:data.publicUrl})
.eq("id",id)

loadTasks()

}

function showTab(tab){

document.getElementById("tasksTab").style.display="none"
document.getElementById("galleryTab").style.display="none"
document.getElementById("settingsTab").style.display="none"

document.getElementById(tab+"Tab").style.display="block"

}

document.getElementById("bgUpload").addEventListener("change",function(){

const reader = new FileReader()

reader.onload = e =>{

document.getElementById("bg").src = e.target.result
localStorage.setItem("bg",e.target.result)

}

reader.readAsDataURL(this.files[0])

})

const bg = localStorage.getItem("bg")

if(bg){
document.getElementById("bg").src = bg
}

if("serviceWorker" in navigator){
navigator.serviceWorker.register("sw.js")
}

</script>

</body>
</html>
