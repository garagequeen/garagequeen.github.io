<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>Garage Log</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#111111">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;}

body{background:#111;color:white;height:100vh;overflow:hidden;overscroll-behavior:none;touch-action:pan-y;}

#bg{position:fixed;top:0;left:0;width:100%;height:100%;object-fit:cover;z-index:-2;}
#overlay{position:fixed;inset:0;background:rgba(0,0,0,0.55);z-index:-1;}

#login{
position:fixed;inset:0;display:flex;flex-direction:column;
align-items:center;justify-content:center;gap:20px;background:#111;
}

button{
padding:10px 16px;border:none;border-radius:10px;
background:#3fb950;color:white;font-size:14px;cursor:pointer;margin-top:8px;
}

.container{padding:20px;height:100vh;overflow:auto;padding-bottom:80px;}

.card{background:rgba(30,30,30,0.85);border-radius:16px;padding:16px;margin-bottom:14px;}

input,select,textarea{
width:100%;margin-top:10px;padding:10px;
border-radius:8px;border:none;background:#222;color:white;font-size:14px;
}
textarea{height:72px;resize:none;}

.tabs{
position:fixed;bottom:0;left:0;width:100%;
display:flex;background:#000;border-top:1px solid #222;
padding-bottom:env(safe-area-inset-bottom);
}
.tabs button{flex:1;background:none;padding:14px;font-size:14px;color:white;margin-top:0;border-radius:0;}
.tabs button.active{color:#3fb950;}

#projectDetail{
position:fixed;inset:0;background:#111;z-index:50;
display:none;flex-direction:column;overflow-y:auto;
}
#projectDetail.open{display:flex;}
.detail-header{
display:flex;align-items:center;gap:12px;
padding:16px 20px;border-bottom:1px solid #222;
position:sticky;top:0;background:#111;z-index:10;
}
.back-btn{background:none;border:none;color:#aaa;font-size:22px;cursor:pointer;margin-top:0;padding:0;}
.detail-title{font-size:18px;font-weight:600;}
.detail-actions{margin-left:auto;display:flex;gap:8px;}
.detail-actions button{margin-top:0;font-size:12px;padding:6px 12px;}
.btn-danger{background:#c0392b !important;}

.task-card{
background:rgba(30,30,30,0.85);border-radius:16px;
padding:14px 16px;margin-bottom:14px;
display:flex;align-items:flex-start;gap:12px;
}
.task-check{
width:22px;height:22px;min-width:22px;
border:2px solid #444;border-radius:6px;
cursor:pointer;display:flex;align-items:center;justify-content:center;
background:none;padding:0;margin-top:1px;
}
.task-check.done{background:#3fb950;border-color:#3fb950;}
.task-check.done::after{content:‘✓’;font-size:12px;color:#111;font-weight:700;}
.task-body{flex:1;}
.task-title{font-size:15px;line-height:1.4;}
.task-title.done{text-decoration:line-through;color:#666;}
.task-meta{font-size:12px;color:#666;margin-top:4px;}

.sheet-overlay{
position:fixed;inset:0;background:rgba(0,0,0,0.7);
z-index:100;display:none;align-items:flex-end;
}
.sheet-overlay.open{display:flex;}
.sheet{
background:#1a1a1a;border-radius:20px 20px 0 0;
padding:20px;width:100%;border-top:1px solid #333;
animation:slideUp 0.25s ease;
}
@keyframes slideUp{from{transform:translateY(100%);}to{transform:translateY(0);}}
.sheet-handle{width:36px;height:3px;background:#333;border-radius:2px;margin:0 auto 16px;}
.sheet h3{font-size:16px;margin-bottom:4px;}
.sheet button{width:100%;}
.btn-cancel{background:#333 !important;margin-top:8px;}

.confirm-overlay{
position:fixed;inset:0;background:rgba(0,0,0,0.8);
z-index:200;display:none;align-items:center;justify-content:center;padding:24px;
}
.confirm-overlay.open{display:flex;}
.confirm-box{background:#1a1a1a;border-radius:16px;padding:24px;width:100%;max-width:320px;}
.confirm-box h3{font-size:16px;margin-bottom:8px;}
.confirm-box p{font-size:13px;color:#aaa;margin-bottom:20px;line-height:1.5;}
.confirm-actions{display:flex;gap:8px;}
.confirm-actions button{flex:1;margin-top:0;}

.focus-card{background:rgba(30,30,30,0.85);border-radius:16px;padding:20px;margin-bottom:14px;}
.focus-project{font-size:11px;color:#3fb950;text-transform:uppercase;letter-spacing:0.05em;margin-bottom:6px;}
.focus-title{font-size:22px;font-weight:600;margin-bottom:8px;}
.focus-notes{font-size:13px;color:#aaa;margin-bottom:16px;line-height:1.5;}
.focus-actions{display:flex;gap:8px;}
.focus-actions button{flex:1;margin-top:0;}
.btn-skip{background:#333 !important;}
.focus-count{font-size:12px;color:#555;padding:4px 0 8px;}

.empty{text-align:center;padding:60px 20px;color:#555;line-height:1.6;}

.version{text-align:center;font-size:11px;color:#333;padding:24px 0 4px;}
</style>

</head>
<body>

<img id="bg">
<div id="overlay"></div>

<div id="login">
  <h2 id="loginTitle">Garage Log</h2>
  <button onclick="login()" id="loginBtn">Sign in with Google</button>
</div>

<div id="app" style="display:none">

  <div id="focusTab" class="container">
    <h2 id="focusTitle">Focus</h2>
    <div id="focusContent"></div>
  </div>

  <div id="tasksTab" class="container" style="display:none">
    <h2 style="margin-bottom:14px">Tasks</h2>
    <div id="allTasksList"></div>
    <div class="card">
      <select id="newTaskProject">
        <option value="">Select project...</option>
      </select>
      <input id="newTaskTitleGlobal" placeholder="Task name" autocomplete="off">
      <button onclick="addTaskGlobal()">Add task</button>
    </div>
  </div>

  <div id="projectsTab" class="container" style="display:none">
    <h2 style="margin-bottom:14px" id="projectsTitle">Projects</h2>
    <div id="projectsList"></div>
    <div class="card">
      <input id="newProject" placeholder="New project name">
      <button onclick="addProject()" id="addProjectBtn">Add project</button>
    </div>
  </div>

  <div id="settingsTab" class="container" style="display:none">
    <div class="card">
      <h3 id="accountTitle">Account</h3>
      <p id="userEmail" style="color:#aaa;margin-top:8px;font-size:14px"></p>
      <button onclick="logout()" id="logoutBtn">Logout</button>
    </div>
    <div class="card">
      <h3 id="bgTitle">Background</h3>
      <input type="file" id="bgUpload" accept="image/*">
    </div>
    <div class="card">
      <h3 id="feedbackTitle">Feedback</h3>
      <button onclick="openFeedback('bug')" id="feedbackBugBtn" style="background:#c0392b;margin-top:10px">🐛 Problem</button>
      <button onclick="openFeedback('idea')" id="feedbackIdeaBtn" style="margin-top:8px">💡 Idea</button>
    </div>
    <div class="version">v0.2.3</div>
  </div>

  <div class="tabs">
    <button id="tab-focus" class="active" onclick="showTab('focus')">Focus</button>
    <button id="tab-tasks" onclick="showTab('tasks')">Tasks</button>
    <button id="tab-projects" onclick="showTab('projects')">Projects</button>
    <button id="tab-settings" onclick="showTab('settings')">Settings</button>
  </div>
</div>

<!-- PROJECT DETAIL -->

<div id="projectDetail">
  <div class="detail-header">
    <button class="back-btn" onclick="closeDetail()">←</button>
    <div class="detail-title" id="detailTitle"></div>
    <div class="detail-actions">
      <button onclick="openAddTask()" id="addTaskBtn">+ Task</button>
      <button class="btn-danger" onclick="confirmDelete()" id="deleteProjectBtn">Delete</button>
    </div>
  </div>
  <div style="padding:16px" id="tasksList"></div>
</div>

<!-- ADD TASK -->

<div class="sheet-overlay" id="addTaskSheet" onclick="closeIfBg(event,'addTaskSheet')">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <h3 id="newTaskTitle2">New task</h3>
    <input id="newTaskTitle" placeholder="Task name" autocomplete="off">
    <select id="newTaskPriority">
      <option value="" id="priorityOpt">Priority (optional)</option>
      <option value="high" id="priorityHigh">High</option>
      <option value="medium" id="priorityMedium">Medium</option>
      <option value="low" id="priorityLow">Low</option>
    </select>
    <textarea id="newTaskNotes" id="notesField" placeholder="Notes (optional)"></textarea>
    <button onclick="addTask()" style="margin-top:12px" id="addTaskSubmit">Add task</button>
    <button class="btn-cancel" onclick="closeSheet('addTaskSheet')" id="cancelTaskBtn">Cancel</button>
  </div>
</div>

<!-- CONFIRM -->

<div class="confirm-overlay" id="confirmOverlay">
  <div class="confirm-box">
    <h3 id="confirmTitle"></h3>
    <p id="confirmText"></p>
    <div class="confirm-actions">
      <button style="background:#333;margin-top:0" onclick="closeConfirm()" id="cancelDeleteBtn">Cancel</button>
      <button class="btn-danger" style="margin-top:0" id="confirmOk">Delete</button>
    </div>
  </div>
</div>

<script>

// ── i18n ──
const LANGS = {
  en: {
    appName: "Garage Log",
    signIn: "Sign in with Google",
    focus: "Focus",
    tasks: "Tasks",
    projects: "Projects",
    settings: "Settings",
    noProjects: "No projects yet.<br>Add your first one below.",
    newProjectPlaceholder: "New project name",
    addProject: "Add project",
    noTasks: "No tasks yet.<br>Tap "+ Task" to add one.",
    addTask: "+ Task",
    deleteProject: "Delete",
    newTask: "New task",
    taskNamePlaceholder: "Task name",
    priority: "Priority (optional)",
    priorityHigh: "High",
    priorityMedium: "Medium",
    priorityLow: "Low",
    notesPlaceholder: "Notes (optional)",
    addTaskBtn: "Add task",
    cancel: "Cancel",
    deleteProjectTitle: "Delete project?",
    deleteProjectText: (title) => `"${title}" and all its tasks will be deleted.`,
    deleteBtn: "Delete",
    complete: "Complete",
    skip: "Skip",
    focusEmpty: "All done or blocked.",
    focusNoProjects: "Add projects and tasks to see your focus.",
    tasksAvailable: (n) => `${n} task${n!==1?"s":""} available`,
    openTasks: (n) => `${n} open task${n!==1?"s":""}`,
    account: "Account",
    logout: "Logout",
    background: "Background",
    feedback: "Feedback",
    feedbackBug: "🐛 Problem",
    feedbackIdea: "💡 Idea",
    feedbackSend: "Send",
  },
  uk: {
    appName: "Garage Log",
    signIn: "Увійти через Google",
    focus: "Фокус",
    tasks: "Завдання",
    projects: "Проєкти",
    settings: "Налаштування",
    noProjects: "Поки немає проєктів.<br>Додай перший нижче.",
    newProjectPlaceholder: "Назва проєкту",
    addProject: "Додати проєкт",
    noTasks: "Поки немає завдань.<br>Натисни "+ Завдання".",
    addTask: "+ Завдання",
    deleteProject: "Видалити",
    newTask: "Нове завдання",
    taskNamePlaceholder: "Назва завдання",
    priority: "Пріоритет (необов'язково)",
    priorityHigh: "Високий",
    priorityMedium: "Середній",
    priorityLow: "Низький",
    notesPlaceholder: "Нотатки (необов'язково)",
    addTaskBtn: "Додати завдання",
    cancel: "Скасувати",
    deleteProjectTitle: "Видалити проєкт?",
    deleteProjectText: (title) => `"${title}" та всі його завдання буде видалено.`,
    deleteBtn: "Видалити",
    complete: "Готово",
    skip: "Пропустити",
    focusEmpty: "Все зроблено або заблоковано.",
    focusNoProjects: "Додай проєкти та завдання щоб побачити фокус.",
    tasksAvailable: (n) => `${n} завдань доступно`,
    openTasks: (n) => `${n} відкритих завдань`,
    account: "Акаунт",
    logout: "Вийти",
    background: "Фон",
    feedback: "Зворотній зв'язок",
    feedbackBug: "🐛 Проблема",
    feedbackIdea: "💡 Ідея",
    feedbackSend: "Надіслати",
  }
}

const lang = (navigator.language || "en").startsWith("uk") ? "uk" : "en"
const i = LANGS[lang]


function applyLang() {
  document.getElementById("loginTitle").innerText = i.appName
  document.getElementById("loginBtn").innerText = i.signIn
  document.getElementById("focusTitle").innerText = i.focus
  document.getElementById("projectsTitle").innerText = i.projects
  document.getElementById("newProject").placeholder = i.newProjectPlaceholder
  document.getElementById("addProjectBtn").innerText = i.addProject
  document.getElementById("accountTitle").innerText = i.account
  document.getElementById("logoutBtn").innerText = i.logout
  document.getElementById("bgTitle").innerText = i.background
  document.getElementById("addTaskBtn").innerText = i.addTask
  document.getElementById("deleteProjectBtn").innerText = i.deleteProject
  document.getElementById("newTaskTitle2").innerText = i.newTask
  document.getElementById("newTaskTitle").placeholder = i.taskNamePlaceholder
  document.getElementById("priorityOpt").innerText = i.priority
  document.getElementById("priorityHigh").innerText = i.priorityHigh
  document.getElementById("priorityMedium").innerText = i.priorityMedium
  document.getElementById("priorityLow").innerText = i.priorityLow
  document.getElementById("newTaskNotes").placeholder = i.notesPlaceholder
  document.getElementById("addTaskSubmit").innerText = i.addTaskBtn
  document.getElementById("cancelTaskBtn").innerText = i.cancel
  document.getElementById("cancelDeleteBtn").innerText = i.cancel
  document.getElementById("confirmOk").innerText = i.deleteBtn
  document.getElementById("feedbackTitle").innerText = i.feedback
  document.getElementById("feedbackBugBtn").innerText = i.feedbackBug
  document.getElementById("feedbackIdeaBtn").innerText = i.feedbackIdea
  document.getElementById("feedbackSubmitBtn").innerText = i.feedbackSend
  document.getElementById("feedbackCancelBtn").innerText = i.cancel
  document.querySelectorAll(".tabs button").forEach(b => {
    const tab = b.id.replace("tab-","")
    if (i[tab]) b.innerText = i[tab]
  })
}
const SUPA_URL = "https://fqmmlntmpybijmvrsfxx.supabase.co"
const SUPA_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZxbW1sbnRtcHliaWptdnJzZnh4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI4MTYyMzMsImV4cCI6MjA4ODM5MjIzM30.HeiCco9pyNwDKUJJhA5Af6Yh7AIRZH5GGlvr4BFOcXk"
const sb = supabase.createClient(SUPA_URL, SUPA_KEY, { auth: { flowType: 'pkce' } })

let user = null, projects = [], tasks = [], currentProject = null

function login() {
  sb.auth.signInWithOAuth({ provider:"google", options:{ redirectTo: window.location.origin } })
}
async function logout() { await sb.auth.signOut(); location.reload() }

async function checkUser() {
  const { data } = await sb.auth.getSession()
  if (data.session) {
    user = data.session.user
    document.getElementById("login").style.display = "none"
    document.getElementById("app").style.display = "block"
    document.getElementById("userEmail").innerText = user.email
    await loadAll()
  }
}
sb.auth.onAuthStateChange((_e, s) => { if (s && !user) checkUser() })
checkUser()

async function loadAll() {
  const [p, t] = await Promise.all([
    sb.from("projects").select("*").eq("user_id", user.id).order("created_at", { ascending: false }),
    sb.from("tasks").select("*").eq("user_id", user.id).order("created_at", { ascending: false })
  ])
  projects = p.data || []
  tasks = t.data || []
  renderProjects()
  renderFocus()
  if (currentProject) renderTasks()
  if (!projects.length) showTab("projects")
}

function renderProjects() {
  const el = document.getElementById("projectsList")
  if (!projects.length) { el.innerHTML = `<div class="empty">${i.noProjects}</div>`; return }
  el.innerHTML = ""
  projects.forEach(p => {
    const open = tasks.filter(t => t.project_id === p.id && t.status !== "done").length
    const d = document.createElement("div")
    d.className = "card"
    d.style.cursor = "pointer"
    d.innerHTML = `<b>${p.title}</b><div style="font-size:12px;color:#666;margin-top:4px">${open} open task${open!==1?"s":""}</div>`
    d.onclick = () => openDetail(p)
    el.appendChild(d)
  })
}

async function addProject() {
  const title = document.getElementById("newProject").value.trim()
  if (!title) return
  await sb.from("projects").insert({ title, user_id: user.id })
  document.getElementById("newProject").value = ""
  await loadAll()
}

async function deleteProject(id) {
  await sb.from("tasks").delete().eq("project_id", id).eq("user_id", user.id)
  await sb.from("projects").delete().eq("id", id).eq("user_id", user.id)
  closeDetail()
  await loadAll()
}

function openDetail(p) {
  currentProject = p
  document.getElementById("detailTitle").innerText = p.title
  document.getElementById("projectDetail").classList.add("open")
  renderTasks()
}
function closeDetail() { document.getElementById("projectDetail").classList.remove("open"); currentProject = null }

function renderTasks() {
  const el = document.getElementById("tasksList")
  const pt = tasks.filter(t => t.project_id === currentProject?.id)
  if (!pt.length) { el.innerHTML = `<div class="empty">${i.noTasks}</div>`; return }
  el.innerHTML = ""
  const open = pt.filter(t => t.status !== "done")
  const done = pt.filter(t => t.status === "done")
  ;[...open, ...done].forEach(t => {
    const isDone = t.status === "done"
    const d = document.createElement("div")
    d.className = "task-card"
    d.innerHTML = `
      <div class="task-check${isDone?" done":""}" onclick="completeTask('${t.id}')"></div>
      <div class="task-body">
        <div class="task-title${isDone?" done":""}">${t.title}</div>
        ${t.priority?`<div class="task-meta">${t.priority}</div>`:""}
        ${t.notes?`<div class="task-meta">${t.notes}</div>`:""}
      </div>`
    el.appendChild(d)
  })
}

function openAddTask() {
  document.getElementById("addTaskSheet").classList.add("open")
  setTimeout(() => document.getElementById("newTaskTitle").focus(), 300)
}

async function addTask() {
  const title = document.getElementById("newTaskTitle").value.trim()
  if (!title || !currentProject) return
  await sb.from("tasks").insert({
    title, user_id: user.id, project_id: currentProject.id,
    priority: document.getElementById("newTaskPriority").value || null,
    notes: document.getElementById("newTaskNotes").value.trim() || null,
    status: "open"
  })
  document.getElementById("newTaskTitle").value = ""
  document.getElementById("newTaskNotes").value = ""
  document.getElementById("newTaskPriority").value = ""
  closeSheet("addTaskSheet")
  await loadAll()
}

async function completeTask(id) {
  await sb.from("tasks").update({ status:"done", done_at: new Date().toISOString() }).eq("id", id).eq("user_id", user.id)
  await loadAll()
}

function renderFocus() {
  const el = document.getElementById("focusContent")
  const open = tasks.filter(t => t.status !== "done" && !t.blocked_reason)
  if (!open.length) {
    el.innerHTML = `<div class="empty">${projects.length ? i.focusEmpty : i.focusNoProjects}</div>`
    return
  }
  const pm = {}; projects.forEach(p => pm[p.id] = p)
  el.innerHTML = `<div class="focus-count">${i.tasksAvailable(open.length)}</div>`
  open.forEach(t => {
    const proj = pm[t.project_id]
    const d = document.createElement("div")
    d.className = "focus-card"
    d.innerHTML = `
      ${proj?`<div class="focus-project">${proj.title}</div>`:""}
      <div class="focus-title">${t.title}</div>
      ${t.notes?`<div class="focus-notes">${t.notes}</div>`:""}
      <div class="focus-actions">
        <button onclick="completeTask('${t.id}')">Complete</button>
        <button class="btn-skip" onclick="this.closest('.focus-card').remove()">${i.skip}</button>
      </div>`
    el.appendChild(d)
  })
}

function showTab(tab) {
  ["focus","tasks","projects","settings"].forEach(t => {
    document.getElementById(t+"Tab").style.display = t===tab?"block":"none"
    document.getElementById("tab-"+t).classList.toggle("active", t===tab)
  })
}

function closeSheet(id) { document.getElementById(id).classList.remove("open") }
function closeIfBg(e, id) { if (e.target===document.getElementById(id)) closeSheet(id) }

let pendingDelete = null
function confirmDelete() {
  pendingDelete = () => deleteProject(currentProject.id)
  document.getElementById("confirmTitle").innerText = i.deleteProjectTitle
  document.getElementById("confirmText").innerText = i.deleteProjectText(currentProject.title)
  document.getElementById("confirmOk").onclick = () => { closeConfirm(); pendingDelete() }
  document.getElementById("confirmOverlay").classList.add("open")
}
function closeConfirm() { document.getElementById("confirmOverlay").classList.remove("open") }

document.getElementById("bgUpload").addEventListener("change", function() {
  const r = new FileReader()
  r.onload = e => { document.getElementById("bg").src = e.target.result; localStorage.setItem("bg", e.target.result) }
  r.readAsDataURL(this.files[0])
})
const bg = localStorage.getItem("bg")
if (bg) document.getElementById("bg").src = bg


// FEEDBACK
let feedbackType = null
function openFeedback(type) {
  feedbackType = type
  const titles = { bug: { en: "Report a problem", uk: "Повідомити про проблему" }, idea: { en: "Share an idea", uk: "Поділитись ідеєю" } }
  document.getElementById("feedbackSheetTitle").innerText = titles[type][lang]
  document.getElementById("feedbackText").value = ""
  document.getElementById("feedbackSheet").classList.add("open")
  setTimeout(() => document.getElementById("feedbackText").focus(), 300)
}

async function submitFeedback() {
  const text = document.getElementById("feedbackText").value.trim()
  if (!text) return
  await sb.from("feedback").insert({ user_id: user?.id || null, type: feedbackType, text })
  closeSheet("feedbackSheet")
  document.getElementById("feedbackText").value = ""
}

applyLang()

if ("serviceWorker" in navigator) navigator.serviceWorker.register("sw.js")

document.addEventListener("touchmove", e => {
  if (e.touches.length > 1) e.preventDefault()
}, { passive: false })

let lastTouchEnd = 0
document.addEventListener("touchend", e => {
  const now = Date.now()
  if (now - lastTouchEnd < 300) e.preventDefault()
  lastTouchEnd = now
}, { passive: false })
</script>

<!-- FEEDBACK -->

<div class="sheet-overlay" id="feedbackSheet" onclick="closeIfBg(event,'feedbackSheet')">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <h3 id="feedbackSheetTitle">Feedback</h3>
    <textarea id="feedbackText" placeholder="Describe the problem or idea..." style="margin-top:12px"></textarea>
    <button onclick="submitFeedback()" id="feedbackSubmitBtn" style="margin-top:12px">Send</button>
    <button class="btn-cancel" onclick="closeSheet('feedbackSheet')" id="feedbackCancelBtn">Cancel</button>
  </div>
</div>
</body>
</html>
